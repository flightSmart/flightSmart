<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/images/flightSmartLogoTransparent.png">
<title>flightSmart</title>
<link href='https://fonts.googleapis.com/css?family=B612 Mono' rel='stylesheet'>
<link rel="stylesheet"  href="mainstyle.css" type="text/css" />
</head>
<body>




<div class="ldgDIV" style="display: flex; flex-direction: column;">
    <a href="/index.html"><img src="images/flightSmartTitleOG.png" width="200" alt="flightSmart"></a>
    <a class="ldgBtton" href="/aircraftCalculator.html" title="Aircraft Calculator">Aircraft Calculator (using Community Data!)</a>
    <a class="ldgBtton" href="flightplan.php" title="Flightplan Generator">Flightplan Generator (via Simbrief)</a>
    <div class="button-container">
        <a class="ldgBtton" href="/kmlToIF.html" title="KML to IF">KML -> IF</a> 
        <a class="ldgBtton" href="/descent.html" title="TOD Calculator">TOD Calculator</a>
    </div>
    <div class="button-container">
        <a class="ldgBtton" href="/autohold.html" title="Auto Hold">Auto Hold</a> 
    </div>
</div>

<table class="flightData">
    <tr>
        <td class="expertServerTable">Loading... (replace with a loading spinner gif or style however you like)</td>
    </tr>
</table>

<div class="WebsiteCredits">
    <br>
    <a href="https://community.infiniteflight.com/t/the-unofficial-infinite-aircraft-calculator-using-community-data/869648" target="_blank" class="myCredit">website by darkeyes ↗</a>
</div>
<script>
    const cdnUrl = window.location.protocol.includes('https') ? 'https://flightsmart.tools/api/if' : 'http://localhost:3000';
    fetch(`${cdnUrl}/world-status.json`)
        .then(response => response.json())
        .then(data => {
            document.querySelector('.flightData').innerHTML = '';
            data.airports.sort((a, b) => (b.gtads.length - a.gtads.length) || (b.inbounds - a.inbounds)).forEach(airport => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="expertServerTable">${airport.icao}</td>
                    <td class="expertServerTable">${airport.inbounds} Inbound${(airport.inbounds === 1) ? '' : 's'}</td>
                    <td class="expertServerTable" style="color: rgb(100, 195, 153);"><img src="images/atc-icon${airport.gtads ? '' : '-grey'}.svg" width="14" alt="">${airport.gtads}</td>
                `;
                document.querySelector('.flightData').appendChild(row);
            });
        })
        .catch(error => {
            console.error('Error fetching world status:', error);
        });
</script>
</body>
</html>
