function _solveNormalEquations(A, b) {
    // Normal equations: (A^T A) x = A^T b  →  3×3 system
    const ATA = [[0,0,0],[0,0,0],[0,0,0]];
    const ATb = [0, 0, 0];
    for (let i = 0; i < A.length; i++) {
        for (let j = 0; j < 3; j++) {
            ATb[j] += A[i][j] * b[i];
            for (let k = 0; k < 3; k++) ATA[j][k] += A[i][j] * A[i][k];
        }
    }
    // Gaussian elimination with partial pivoting
    const aug = ATA.map((row, i) => [...row, ATb[i]]);
    for (let col = 0; col < 3; col++) {
        let max = col;
        for (let r = col + 1; r < 3; r++)
            if (Math.abs(aug[r][col]) > Math.abs(aug[max][col])) max = r;
        [aug[col], aug[max]] = [aug[max], aug[col]];
        for (let r = col + 1; r < 3; r++) {
            const f = aug[r][col] / aug[col][col];
            for (let k = col; k <= 3; k++) aug[r][k] -= f * aug[col][k];
        }
    }
    const x = [0, 0, 0];
    for (let i = 2; i >= 0; i--) {
        x[i] = aug[i][3];
        for (let j = i + 1; j < 3; j++) x[i] -= aug[i][j] * x[j];
        x[i] /= aug[i][i];
    }
    return x;
}

const _MAP_A  = MAP_CALIBRATION.map(p => [p[1], p[0], 1]); // [lon, lat, 1]

const _MAP_AY = _solveNormalEquations(_MAP_A, MAP_CALIBRATION.map(p => p[3]));

function getMapCoords(lat, lon) {

    ];
}

const apiCache = new Map()

async function fetchWithCache(url, ttlMs) {
    const now = Date.now();
    const cachedItem = apiCache.get(url);
    
    // Return cached data if it exists and hasn't expired
    if (cachedItem && (now - cachedItem.timestamp < ttlMs)) {
        return cachedItem.data;
    }
    
    // Otherwise, fetch fresh data
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    const data = await response.json();
    
    // Save to cache with current timestamp
    apiCache.set(url, { data, timestamp: now });
    return data;
}

// --- Helper Functions ---
function getDuration(startTime) {
    if (!startTime) return "";
    const diffMs = Date.now() - startTime;
    const diffMins = Math.floor(diffMs / 60000);
    const hours = Math.floor(diffMins / 60);
    const mins = diffMins % 60;
    return hours > 0 ? `${hours}h ${mins}m` : `${mins}m`;
}

function getAtcGlow(gtads) {
    if (!gtads) return 0;
    const min = 0.2, max = 0.9;
    const minLen = 1, maxLen = 5;
    const clamped = Math.min(Math.max(gtads.length, minLen), maxLen);
    return min + ((clamped - minLen) / (maxLen - minLen)) * (max - min);
}


function formatATIS(raw) {
    if (!raw || typeof raw !== 'string') return raw;

    const infoMatch     = raw.match(/information ([A-Z]+)/i);
    const timeMatch     = raw.match(/time (\d{4}) ZULU/i);
    const windCalmMatch = raw.match(/Wind Calm/i);
    const windMatch     = !windCalmMatch && raw.match(/Wind (\d{3}) at (\d+)( gust (\d+))?/i);
    const visMatch      = raw.match(/Visibility (\d+)/i);
    const tempMatch     = raw.match(/Temperature (-?\d+)/i);
    const dewMatch      = raw.match(/Dew Point (-?\d+)/i);
    const altMatch      = raw.match(/Altimeter (\d{4})/i);
    const ldgMatch      = raw.match(/Landing Runway[s]?\s+([\w,\s]+?)(?=\s*,?\s*Departing|\.|$)/i);
    const depRwMatch    = raw.match(/Departing Runway[s]?\s+([\w,\s]+?)(?=\.|$|\s+Advise|\s+Notam)/i);

    // SID/STAR — grab comma-separated identifiers after each keyword
    const sidMatch  = raw.match(/Recommended Departure Procedures[,\s]+([A-Z0-9,\s]+?)(?=,?\s*Recommended Arrival|,?\s*Advise|,?\s*Notam|\.|$)/i);
    const starMatch = raw.match(/Recommended Arrival Procedures[,\s]+([A-Z0-9,\s]+?)(?=,?\s*Advise|,?\s*Notam|\.|$)/i);

    const parseProcList = (str) => {
        if (!str) return [];
        return str.split(/[\s,]+/).map(s => s.trim()).filter(s => /^[A-Z0-9]{3,8}$/.test(s));
    };

    const sids  = parseProcList(sidMatch  ? sidMatch[1]  : '');
    const stars = parseProcList(starMatch ? starMatch[1] : '');

    // Time + staleness color
    let timeStr = '';
    if (timeMatch) {
        const atisTime = timeMatch[1];
        const now = new Date();
        const currentZuluMinutes = now.getUTCHours() * 60 + now.getUTCMinutes();
        const atisMinutes = parseInt(atisTime.substring(0,2)) * 60 + parseInt(atisTime.substring(2,4));
        let diff = currentZuluMinutes - atisMinutes;
        if (diff < 0) diff += 1440;
        let warningColor = '#e3e3e3';
        if (diff >= 120)      warningColor = 'rgb(179, 32, 32)';
        else if (diff >= 65)  warningColor = 'rgb(244, 167, 77)';
        timeStr = `${atisTime}Z <span style="color:${warningColor};">(${diff} min. ago)</span>`;
    }

    const wind  = windCalmMatch ? 'CALM'
                : windMatch     ? `${windMatch[1]}${windMatch[2].padStart(2,'0')}${windMatch[4] ? 'G'+windMatch[4] : ''}KT`
                : '';
    const vis   = visMatch   ? `${visMatch[1]}SM`          : '';
    const temp  = tempMatch  ? tempMatch[1].padStart(2,'0') : 'XX';
    const dew   = dewMatch   ? dewMatch[1].padStart(2,'0')  : 'XX';
    const alt   = altMatch   ? `A${altMatch[1]}`            : '';
    const ldgRw = ldgMatch   ? ldgMatch[1].trim()           : 'N/A';
    const toRw  = depRwMatch ? depRwMatch[1].trim()         : 'N/A';

    // SID/STAR table — only rendered when at least one list is populated
    let procHtml = '';
    if (sids.length > 0 || stars.length > 0) {
        procHtml = `
            <div style="margin-top: 10px; padding-top: 7px; border-top: 0px solid rgba(255,255,255,0.1);">

            </div>`;
    }

    // Remarks & NOTAMs — map raw phrases to short display labels
    const remarkFlags = [
        // Updated to use your MC file
        { re: /no intersection departures/i,                          label: 'No Intersection Dept.', file: 'NoIntersectionDeptMC' }, 
        { re: /no pattern work/i,                                     label: 'No Pattern Work',        file: 'NoPatternWorkMC' },

function getTrafficColor(count) {
    const colors = {
        gray:   [224, 225, 226], // < 20
        yellow: [244, 167, 77],  // 55
        red:    [179, 32, 32]      // 110
    };

    if (count < 20) return `rgb(${colors.gray.join(',')})`;
    if (count >= 110) return `rgb(${colors.red.join(',')})`;

    let start, end, ratio;
    if (count < 55) {
        start = colors.gray;
        end = colors.yellow;
        ratio = (count - 20) / (55 - 20);
    } else {
        start = colors.yellow;
        end = colors.red;
        ratio = (count - 55) / (110 - 55);
    }

    const lerp = (s, e, t) => Math.round(s + (e - s) * t);
    return `rgb(${lerp(start[0], end[0], ratio)}, ${lerp(start[1], end[1], ratio)}, ${lerp(start[2], end[2], ratio)})`;
}

// --- NEW SVG GRAPH GENERATOR ---
function generateInboundGraph(buckets) {
    if (!buckets) return '';

    const b15 = buckets['15'] || 0;
    const b30 = buckets['30'] || 0;
    const b45 = buckets['45'] || 0;
    const b60 = buckets['60'] || 0;
    const b75 = buckets['75'] || 0;
    const b90 = buckets['90'] || 0;
    const b105 = buckets['105'] || 0;
    const b120 = buckets['120'] || 0;
    const b135 = buckets['135'] || 0;
    const b150 = buckets['150'] || 0;
    const b165 = buckets['165'] || 0;
    const b180 = buckets['180'] || 0;
    

    const maxVal = Math.max(b15, b30, b45, b60, b75, b90, b105, b120, b135, b150, b165, b180, 4);
    const chartHeight = 80;
    const axisY = chartHeight + 20;
    
    const getY = (val) => chartHeight - ((val / maxVal) * (chartHeight - 30)) + 10;
    const mapX = (t) => 20 + (t / 180) * 460;
    
    const x0 = mapX(0);
    const [x15, x30, x45, x60, x75, x90, x105, x120, x135, x150, x165, x180] = [15, 30, 45, 60, 75, 90, 105, 120, 135, 150, 165, 180].map(mapX);
    const [y15, y30, y45, y60, y75, y90, y105, y120, y135, y150, y165, y180] = [b15, b30, b45, b60, b75, b90, b105, b120, b135, b150, b165, b180].map(getY);

        
    const makeNode = (x, y, val, label) => `
        <line x1="${x}" y1="${y}" x2="${x}" y2="${axisY}" stroke="#7ab48b" stroke-width="1" opacity="0." stroke-dasharray="2,2" />
        <circle cx="${x}" cy="${y}" r="3" fill="#7ab48b" filter="url(#dot-glow)" />
        <text x="${x}" y="${y - 8}" fill="#aaa" font-weight="bold" font-size="10" text-anchor="middle" font-family="'B612 Mono', monospace">${val}</text>
        <text x="${x}" y="${axisY + 15}" fill="#aaa" font-weight="bold" text-anchor="middle" font-family="'B612 Mono', monospace" font-size="8">${label}</text>
    `;

return `
    <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
        <div style="color: #aaa; margin-bottom: 10px; font-weight: bold; font-size: 0.75em; letter-spacing: 1px;">INBOUND TRAFFIC TIMELINE</div>
        <svg width="100%" height="130" viewBox="0 0 500 130" style="max-width: 500px; display: block;">
            
            <defs>
                <filter id="dot-glow" x="-100%" y="-100%" width="300%" height="300%">
                    <feGaussianBlur stdDeviation="2.5" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
                <pattern id="smallGrid" width="8" height="8" patternUnits="userSpaceOnUse">
                    <path d="M 8 0 L 0 0 0 8" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
                </pattern>
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <rect width="40" height="40" fill="url(#smallGrid)"/>
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                </pattern>
                <clipPath id="chartArea">
                    <rect x="${x0}" y="10" width="${x180 - x0}" height="${axisY - 10}" />
                </clipPath>
            </defs>

            <!-- Grid clipped to chart area -->
            <rect x="${x0}" y="10" width="${x180 - x0}" height="${axisY - 10}" fill="url(#grid)" clip-path="url(#chartArea)" />

            <!-- Axes -->
            <line x1="${x0}" y1="10" x2="${x0}" y2="${axisY}" stroke="#aaa" stroke-width="0.5" />
            <text x="${x0}" y="${axisY + 15}" fill="#aaa" font-weight="bold" text-anchor="middle" font-family="'B612 Mono', monospace" font-size="8">0m</text>
            
            <line x1="10" y1="${axisY}" x2="490" y2="${axisY}" stroke="#aaa" stroke-width="0.5" />
            
            <!-- Line -->
            <polyline points="${x15},${y15} ${x30},${y30} ${x45},${y45} ${x60},${y60} ${x75},${y75} ${x90},${y90} ${x105},${y105} ${x120},${y120} ${x135},${y135} ${x150},${y150} ${x165},${y165} ${x180},${y180}" fill="none" stroke="#7ab48b" stroke-width="2" stroke-dasharray="6,4" />
            ${makeNode(x15, y15, b15, '15m')}
            ${makeNode(x30, y30, b30, '30m')}
            ${makeNode(x45, y45, b45, '45m')}
            ${makeNode(x60, y60, b60, '1h')}
            ${makeNode(x75, y75, b75, '1h15m')}
            ${makeNode(x90, y90, b90, '1h30m')}
            ${makeNode(x105, y105, b105, '1h45m')}
            ${makeNode(x120, y120, b120, '2h')}
            ${makeNode(x135, y135, b135, '2h15m')}
            ${makeNode(x150, y150, b150, '2h30m')}
            ${makeNode(x165, y165, b165, '2h45m')}
            ${makeNode(x180, y180, b180, '3h')}
            
            <!-- Hourly  -->
            <line x1="${x60}" y1="10" x2="${x60}" y2="${axisY}" stroke="#aaa" stroke-width="0.5" />
            <line x1="${x120}" y1="10" x2="${x120}" y2="${axisY}" stroke="#aaa" stroke-width="0.5" />
            <line x1="${x180}" y1="10" x2="${x180}" y2="${axisY}" stroke="#aaa" stroke-width="0.5" />
            
            <line x1="${x0}" y1="${y15}" x2="${x15}" y2="${y15}" fill="none" stroke="#7ab48b" stroke-width="2" stroke-dasharray="6,4" /> />

        </svg>
    </div>
    `;
}

async function fetchWorldStatus() {
    try {
        const url = `${cdnUrl}/world-status.json`;
        const data = await fetchWithCache(url, 60000);
        
        activeSessionId = data.sessionId;

        // Render map with ALL data
        renderGlobalMap(data.airports);

        const tableBody = document.getElementById('flightDataBody');
        tableBody.innerHTML = '';

        // 1. Sort the airports by ATC presence, then by inbound traffic
        const sortedAirports = data.airports.sort((a, b) => 
            (b.gtads.length - a.gtads.length) || (b.inbounds - a.inbounds)
        );

        // 2. Count how many airports currently have active ATC
        const activeAtcCount = sortedAirports.filter(airport => 
            airport.gtads && (airport.gtads.length > 0 || airport.gtads > 0)
        ).length;

        // 3. Show at least 10 airports, OR all active ATC airports if there are > 10
        const displayLimit = Math.max(10, activeAtcCount);

        // 4. Render the rows based on our dynamic limit
        sortedAirports
            .slice(0, displayLimit) 
            .forEach((airport, index) => {
                const row = buildAirportRow(airport, index);
                tableBody.appendChild(row);
            });
            
    } catch (error) {
        console.error('Error fetching world status:', error);
    }
}

let pollTimer = null;
let isIdle = false;

// 1. Function to restart the timer when the user is active
function resetIdleTimer() {
    lastActivityTime = Date.now();
    if (isIdle) {
        console.log("User resumed activity. Fetching data and restarting polling...");
        isIdle = false;
        fetchWorldStatus(); // Immediately grab fresh data
        startPolling();     // Restart the 60s loop
    }
}

// 2. Listeners for user activity
['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll'].forEach(evt => {
    document.addEventListener(evt, resetIdleTimer, { passive: true });
});

// 3. The main polling loop
function startPolling() {
    if (pollTimer) clearInterval(pollTimer); // Clear any existing timers just in case
    
    pollTimer = setInterval(() => {
        if (Date.now() - lastActivityTime >= IDLE_TIMEOUT_MS) {
            console.log("User idle for 15 minutes. Pausing Live API polling.");
            isIdle = true;
            clearInterval(pollTimer); // Stop asking the server for data
        } else {
            fetchWorldStatus(); // User is active, get data!
        }
    }, POLL_INTERVAL_MS);
}

// --- Zulu Time Clock ---
function updateZuluTime() {
    const now = new Date();
    const hours = String(now.getUTCHours()).padStart(2, '0');
    const minutes = String(now.getUTCMinutes()).padStart(2, '0');
    document.getElementById('zulu-time').textContent = `${hours}${minutes}Z`;
}

function generateAirportMap(lat, lon, icao, compact = false) {
    if (lat === undefined || lon === undefined) return '';

    const [px, py] = getMapCoords(lat, lon);

    return `

            <svg viewBox="0 97 ${MAP_VIEWBOX.w} ${MAP_VIEWBOX.h}" width="100%" style="max-width: 500px; display: block;
                    background: transparent; border: 0px solid rgba(255,255,255,0.08); border-radius: 1px;">


                <!-- ↓↓↓ Paste your SVG path data here ↓↓↓ -->
            ${WORLD_MAP_GRAPHICS}
                <!-- Airport pin -->
                <circle cx="${px}" cy="${py}" r="80" fill="none"
                        stroke="#64c399" stroke-width="10" opacity="0.6"/>
                <circle cx="${px}" cy="${py}" r="20"

     if (compact) return svg;

function renderGlobalMap(airports) {
    const container = document.getElementById('globalMapContainer');
    if (!airports) return;

    // Filter all airports to only include those with active ATC
    const openAirports = airports.filter(airport => 
        airport.gtads && (airport.gtads.length > 0 || airport.gtads > 0)
    );

    if (openAirports.length === 0) {
        container.style.display = 'none';
        return;
    }

    container.style.display = 'block';

    let mapPointsHtml = '';
    
    openAirports.forEach(airport => {
        if (airport.lat !== undefined && airport.lon !== undefined) {
            // Use your existing math to get X/Y coordinates!
            const [px, py] = getMapCoords(airport.lat, airport.lon);
            const glow = getAtcGlow(airport.gtads);


            // Create a dot, radar ring, and ICAO label for each open airport
mapPointsHtml += `
                <g style="cursor: pointer;" onclick="openAirportFromMap('${airport.icao}')" onmouseenter="this.style.opacity='0.8'" onmouseleave="this.style.opacity='1'">
                    <circle cx="${px}" cy="${py}" r="50" fill="none" stroke="#64c399" stroke-width="4" opacity="${glow}" />
                    <circle cx="${px}" cy="${py}" r="14" fill="#64c399" />
                </g>
            `;
        }
    });

    container.innerHTML = `
             <svg viewBox="0 97 ${MAP_VIEWBOX.w} ${MAP_VIEWBOX.h}" style="background: rgba(30, 30, 30, 0); width: 72%; display: block; margin: 0 auto;overflow: visible;"">
            ${WORLD_MAP_GRAPHICS}
            ${mapPointsHtml}
        </svg>
    `;
}

// NEW: The click handler for the map
function openAirportFromMap(icao) {
    const row = document.getElementById(`row-${icao}`);

    if (row) {
        // Scroll down to the table
        row.scrollIntoView({ behavior: 'smooth', block: 'center' });

        // Check if details are already open so we don't accidentally close them
        const nextRow = row.nextElementSibling;
        if (!nextRow || !nextRow.classList.contains('atc-dropdown-row')) {
            row.click(); // Triggers toggleAirportDetails
        }

        // Quick visual highlight so the user knows which row was targeted
        const originalBg = row.style.backgroundColor || 'transparent';
        row.style.transition = 'background-color 0.4s ease';
        row.style.backgroundColor = 'rgba(100, 195, 153, 0.4)';
        setTimeout(() => {
            row.style.backgroundColor = originalBg;
        }, 1200);
    }
}



function triggerMapPing(lat, lon) {
    const svg = document.querySelector('#globalMapContainer svg');
    if (!svg) return; // If the map isn't rendered, do nothing

    const [px, py] = getMapCoords(lat, lon);
    
    // Create a temporary SVG circle
    const ping = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    ping.setAttribute("cx", px);
    ping.setAttribute("cy", py);
    ping.setAttribute("r", "14"); // Start at the size of the inner dot
    ping.setAttribute("fill", "none");
    ping.setAttribute("stroke", "#64c399"); // White ping for high visibility
    ping.setAttribute("stroke-width", "6");
    
    // Add it to the map
    svg.appendChild(ping);
    
    // Animate it expanding and fading over 1 second
    let startTime = null;
    function animate(time) {
        if (!startTime) startTime = time;
        const progress = (time - startTime) / 1000; 
        
        if (progress < 1) {
            // Expand radius from 14 to ~120
            ping.setAttribute("r", 14 + (progress * 106));
            // Fade opacity from 1 to 0
            ping.setAttribute("opacity", 1 - progress);
            // Shrink stroke width as it expands for a sharper look
            ping.setAttribute("stroke-width", 6 * (1 - progress));
            
            requestAnimationFrame(animate);
        } else {
            ping.remove(); // Clean up the DOM when done
        }
    }
    requestAnimationFrame(animate);
}


async function toggleAirportDetails(airport, parentRow, bgColor) {
    const icao = airport.icao;
    const nextRow = parentRow.nextElementSibling;

    if (nextRow && nextRow.classList.contains('atc-dropdown-row')) {
        nextRow.remove();
        return;
    }

    if (airport.lat !== undefined && airport.lon !== undefined) {
        triggerMapPing(airport.lat, airport.lon);
    }

    const dropRow = document.createElement('tr');
    dropRow.classList.add('atc-dropdown-row');
    dropRow.innerHTML = `
        <td colspan="6" style="background: linear-gradient(90deg, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 14px, ${bgColor} 14px); padding: 0px 30px; text-align: left; outline: none;">            
            <div id="loading-${icao}" style="color: #aaa; margin-bottom: 5px; font-size: 0.85em;">Loading data for ${icao}...</div>
            <div id="content-${icao}" style="display: none; color: #e3e3e3; font-size: 0.9em;"></div>
        </td>
    `;
    parentRow.parentNode.insertBefore(dropRow, parentRow.nextSibling);

    try {
        const sessionId = activeSessionId;
        if (!sessionId) {
            document.getElementById(`loading-${icao}`).innerText = "Session ID not available yet.";
            return;
        }
        
        const statusUrl = `${cdnUrl}/sessions/${sessionId}/airport/${icao}/status`;
        const atisUrl = `${cdnUrl}/sessions/${sessionId}/airport/${icao}/atis`;
        const metarUrl = `${cdnUrl}/metar/${icao}`;

        // Fetch Status, ATIS, and METAR simultaneously
        const [statusData, atisData, metarRaw] = await Promise.all([
            fetchWithCache(statusUrl, 15000).catch(() => ({ result: { atcFacilities: [] } })),
            fetchWithCache(atisUrl, 15000).catch(() => ({ result: null })),
            fetch(metarUrl).then(res => res.text()).catch(() => (''))
        ]);

        // === NEW HEADER LOGIC ===
        // Build the location string (City, Country)
        const locationParts = [];
        if (airport.city) locationParts.push(airport.city);
        if (airport.country) locationParts.push(airport.country);
        const locationStr = locationParts.length > 0 ? locationParts.join(', ') : 'Location unknown';

        // Format coordinates
        const coordsStr = (airport.lat !== undefined && airport.lon !== undefined) 
            ? `${parseFloat(airport.lat).toFixed(4)}°, ${parseFloat(airport.lon).toFixed(4)}°` 
            : 'Coordinates unknown';

        let contentHtml = `
    <div style="display: flex; justify-content: space-between; margin-top:8px; align-items: top;
                border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 15px;">
        <div>
            <span style="color: #e3e3e3; font-size: 1.0em; font-weight: bold;
                         margin-right: 10px; margin-top:15px; font-family: sans-serif;">${airport.name}</span>
            <span style="color: #aaa; font-size: 0.85em; font-family: 'B612 Mono', monospace;">
                <br>${locationStr}<br>${coordsStr}
            </span>
        </div>
        <div style="width: 180px; flex-shrink: 0; margin-left: 20px;">
            ${generateAirportMap(airport.lat, airport.lon, airport.icao, true)}
        </div>
    </div>

        `;
        




        // 1. Controller Table
        // ... (The rest of your existing contentHtml generation stays exactly the same below this point) ...
        const facilities = statusData.result?.atcFacilities || [];

        // 1. Controller Table
        if (facilities.length > 0) {
            const sortOrder = { 0: 1, 1: 2, 4: 3, 5: 4, 6: 5 };
            facilities.sort((a, b) => (sortOrder[a.type] || 99) - (sortOrder[b.type] || 99));

            
            contentHtml += `
                <div style="color: #aaa; margin-bottom: 6px; font-weight: bold; font-size: 0.75em; letter-spacing: 1px;">FACILITIES</div>
                <table style="width: auto; border-collapse: collapse; margin-bottom: 15px; font-family: 'B612 Mono', monospace;">
                    <thead>
                        <tr style="color: #aaa;">
                            <th style="text-align: left; padding: 0px 0px 2px; font-weight: normal;">Controller</th>
                            <th style="text-align: left; padding: 0px 20px 2px; font-weight: normal;">Station</th>
                            <th style="text-align: left; padding: 0px 20px 2px; font-weight: normal;">Time Online</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
                    
        
            facilities.forEach(f => {
                const stationName = freqMap[f.type] || "Unknown";
                const activeTime = getDuration(new Date(f.startTime).getTime());
                contentHtml += `
                    <tr>
                        <td style="padding: 0px 3px 2px; outline: none; background-color: transparent;">${f.username || 'Unknown'}</td>
                        <td style="padding: 0px 23px 2px; color: rgb(100, 195, 153); outline: none; background-color: transparent;">${stationName}</td>
                        <td style="padding: 0px 23px 2px; color: #aaa; outline: none; background-color: transparent;">${activeTime}</td>
                    </tr>
                `;
            });
            contentHtml += `</tbody></table>`;
        } else {
             contentHtml += `<div style="color: #aaa; margin-bottom: 15px; font-size: 0.85em; font-family: 'B612 Mono', monospace;">No ATC currently active.</div>`;
        }

        // 2. SMART WEATHER SECTION (ATIS Priority, METAR Fallback)
        const isAtisOpen = facilities.some(f => f.type === 7);
        const hasAtisData = atisData && atisData.result && atisData.result.trim().length > 0;

        if (isAtisOpen || hasAtisData) {
            // Show Digital ATIS if available
            let atisDisplay = hasAtisData 
                            ? formatATIS(atisData.result) 
                            : `<div style="color: #777; font-style: italic; font-family: 'B612 Mono', monospace;">ATIS published but currently empty</div>`;

            contentHtml += `
                <div style="margin-top: 5px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1);">
                    <div style="color: #aaa; margin-top: 6px;margin-bottom: 6px; font-weight: bold; font-size: 0.75em; letter-spacing: 1px;">DIGITAL ATIS</div>
                    ${atisDisplay}
                </div>
            `;
        } else {
            // Fallback to METAR if no ATIS is active
            let metarDisplay = metarRaw.trim().length > 0 
                ? `<div style="font-family:'B612 Mono',monospace; line-height:1.6; color:#e3e3e3;">${metarRaw.trim()}</div>`
                : `<div style="color: #777; font-style: italic; font-family: 'B612 Mono', monospace;">METAR unavailable</div>`;

            contentHtml += `
                <div style="margin-top: 5px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1);">
                    <div style="color: #aaa; margin-top: 6px;margin-bottom: 6px; font-weight: bold; font-size: 0.75em; letter-spacing: 1px;">CURRENT METAR</div>
                    ${metarDisplay}
                </div>
            `;
        }

        // 3. INJECT THE INBOUND SVG GRAPH 
        if (airport.inbounds > 0 && airport.inboundBuckets) {
            contentHtml += generateInboundGraph(airport.inboundBuckets);
        }

        document.getElementById(`loading-${icao}`).style.display = 'none';
        const contentDiv = document.getElementById(`content-${icao}`);
        contentDiv.innerHTML = contentHtml;
        contentDiv.style.display = 'block';

    } catch (error) {
        document.getElementById(`loading-${icao}`).innerText = "Failed to load airport details.";
        console.error(`Error fetching detailed status for ${icao}:`, error);
    }
}
