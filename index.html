<script>
    // const cdnUrl = 'https://flightsmart.tools/api/if'; 
    const cdnUrl = window.location.protocol.includes('https') ? 'https://flightsmart.tools/api/if' : 'http://localhost:3000';

    function getDuration(startTime) {
        if (!startTime) return "";
        const diffMs = Date.now() - startTime;
        const diffMins = Math.floor(diffMs / 60000);
        const hours = Math.floor(diffMins / 60);
        const mins = diffMins % 60;
        return hours > 0 ? `${hours}h ${mins}m` : `${mins}m`;
    }

    function getTrafficColor(count) {
        // Define our anchor colors
        const colors = {
            gray:   [224, 225, 226], // < 20
            yellow: [244, 167, 77],  // 55
            red:    [107, 5, 4]      // 110
        };

        // 1. Static Boundaries
        if (count < 20) return `rgb(${colors.gray.join(',')})`;
        if (count >= 110) return `rgb(${colors.red.join(',')})`;

        let start, end, ratio;

        // 2. Determine which segment we are in
        if (count < 55) {
            // Segment 1: Gray to Yellow (Range: 20 to 55)
            start = colors.gray;
            end = colors.yellow;
            ratio = (count - 20) / (55 - 20);
        } else {
            // Segment 2: Yellow to Red (Range: 55 to 110)
            start = colors.yellow;
            end = colors.red;
            ratio = (count - 55) / (110 - 55);
        }

        // 3. Interpolate the RGB channels
        const lerp = (s, e, t) => Math.round(s + (e - s) * t);
        
        const r = lerp(start[0], end[0], ratio);
        const g = lerp(start[1], end[1], ratio);
        const b = lerp(start[2], end[2], ratio);

        return `rgb(${r}, ${g}, ${b})`;
    }


    fetch(`${cdnUrl}/world-status.json`)
        .then(response => response.json())
        .then(data => {
            document.querySelector('.flightData_main').innerHTML = '';

            data.airports
                .sort((a, b) => (b.gtads.length - a.gtads.length) || (b.inbounds - a.inbounds))
                .slice(0, 10) 
                .forEach((airport, index) => { 
                    const row = document.createElement('tr');
                    
                    // Store the color logic in a variable
                    const bgColor = index % 2 === 0 ? 'rgba(50, 50, 50, 0.45)' : 'transparent';
                    
                    const timeOnline = getDuration(airport.startTime);

                    // Inject the bgColor directly into EVERY cell
                    const inboundColor = getTrafficColor(airport.inbounds);
                    const outboundColor = getTrafficColor(airport.outbounds);

                    row.innerHTML = `
                        <td class="expertServerTable" style="background-color: ${bgColor}; padding: 12px 15px;">${airport.icao}</td>
                        
                        <td class="expertServerTable" style="background-color: ${bgColor}; color: ${inboundColor}; padding: 12px 15px;">
                            <svg xmlns="http://www.w3.org/2000/svg" height="14px" viewBox="0 -960 960 960" width="14px" fill="rgba(227, 227, 227, .5)" style="transform: translateY(3px);">
                                <path d="M144-144v-72h672v72H144Zm579-191L144-508v-275l92 27 46 139 131 40-30-335 115 34 116 361 151 44q23 7 37 26.5t14 42.5q0 35-29 57.5T723-335Z"/>
                            </svg>
                            ${airport.inbounds}
                        </td>

                        <td class="expertServerTable" style="background-color: ${bgColor}; color: ${outboundColor}; padding: 12px 25px;">
                            <svg xmlns="http://www.w3.org/2000/svg" height="14px" viewBox="0 -960 960 960" width="14px" fill="rgba(227, 227, 227, .5)" style="transform: translateY(3px);">
                                <path d="M144-144v-72h672v72H144Zm72-192L70-570l93-25 112 94 133-36-203-268 116-32 289 245 163-44q29-8 55 7t34 44q8 29-7 54.5T811-497L216-336Z"/>
                            </svg>
                            ${airport.outbounds}
                        </td>
                                
                        <td class="expertServerTable" style="background-color: ${bgColor}; color: rgb(100, 195, 153); padding: 12px 10px;">
                            <img src="images/atc-icon${airport.gtads ? '' : '-grey'}.svg" width="14" style="vertical-align: -2px;" alt=""> 
                            ${airport.gtads}
                        </td>
                        <td class="expertServerTable" style="background-color: ${bgColor}; color: #aaa; font-size: 0.85em; padding: 10px 15px;">
                            ${timeOnline ? `${timeOnline}` : ''}
                        </td>
                    `;
                    document.querySelector('.flightData_main').appendChild(row);
                });
        })
        .catch(error => {
            console.error('Error fetching world status:', error);
        });

        function updateZuluTime() {
            const now = new Date();
            
            // Get UTC hours and minutes, ensuring they are always two digits
            const hours = String(now.getUTCHours()).padStart(2, '0');
            const minutes = String(now.getUTCMinutes()).padStart(2, '0');
            
            // Combine them into the HHMM format
            const timeString = hours + minutes +'Z';
            
            document.getElementById('zulu-time').textContent = timeString;
        }
updateZuluTime();
setInterval(updateZuluTime, 30000);



</script>
