<!DOCTYPE html>
<html>
<head>
    <title>Logbook Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://fonts.googleapis.com/css?family=B612+Mono' rel='stylesheet'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Shadows+Into+Light&display=swap" rel="stylesheet">    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="icon" type="image/x-icon" href="/images/flightSmartLogoTransparent.png">
    
    <style>
        /* ═══════════════════════════════════════════════════════════
           FLIGHTSMART THEME OVERRIDE
        ═══════════════════════════════════════════════════════════ */
        :root {
            /* Flightsmart Base Colors */
            --bg-dark: rgb(30, 30, 30);
            --bg-light: rgb(50, 50, 50);
            --bg-hover: rgb(60, 60, 60);
            --bg-active: rgb(40, 40, 40);
            --text-main: rgb(224, 225, 226);
            --text-main-alpha: rgba(224, 225, 226, 0.5);
            --text-muted: rgb(150, 150, 150);
            --accent-green: rgb(100, 195, 153);
            --border-main: rgb(131, 131, 131);
            --border-faint: rgba(232, 232, 232, 0.275);
            --font-mono: 'B612 Mono', monospace;
            --font-sans: Helvetica, sans-serif;

            /* Component Mapping */
            --bg-main: var(--bg-dark);
            --bg-sidebar: var(--bg-dark);
            --bg-header-grey: var(--bg-light);
            --bg-accent-grey: var(--bg-light);
            --bg-row-hover: var(--bg-hover);

            --brd-light: var(--border-main);
            --brd-medium: var(--border-main);
            --brd-sidebar: var(--border-main);
            --brd-table: var(--border-faint);

            --txt-main: var(--text-main);
            --txt-muted: var(--text-muted);
            --txt-dim: var(--text-muted);
            --txt-hint: var(--border-main);

            /* Filters */
            --inc-bg: var(--bg-dark);
            --inc-txt: var(--accent-green);
            --inc-brd: var(--accent-green);
            --exc-bg: var(--bg-dark);
            --exc-txt: rgb(248, 81, 73); 
            --exc-brd: rgb(248, 81, 73);

            --sidebar-font: var(--font-mono);
            --hover-info-bg: var(--bg-light);
            --hover-info-brd: var(--border-main);
        }

        /* ── LIGHT MODE THEME ── */
        [data-theme="light"] {
            --bg-dark: rgb(220, 220, 220);
            --bg-light: rgb(225, 225, 225);
            --bg-hover: rgb(218, 217, 213);
            --bg-active: rgb(240, 239, 236);
            --text-main: rgb(70, 70, 70);
            --text-muted: rgb(105, 105, 105);
            --accent-green: rgb(0, 148, 90);
            --border-main: rgb(165, 165, 165);
            --border-faint: rgba(0, 0, 0, 0.1);
            --exc-txt: rgb(196, 48, 43);
            --exc-brd: rgb(196, 48, 43);
            --inc-txt: rgb(0, 148, 90);
            --inc-brd: rgb(0, 148, 90);
        }

        [data-theme="light"] body {
            background-color: rgb(248, 247, 244);
            color: rgb(70, 70, 70);
        }

        /* Lighter, warmer map tiles for light mode */
        [data-theme="light"] .leaflet-layer {
            filter: hue-rotate(000deg) brightness(100%) contrast(100%) saturate(00%); 
        }

        /* Make hardcoded SVG icon strokes readable in light mode */
        [data-theme="light"] .map-btn svg {
            /* Turns the light grey SVG into rgb(105, 105, 105) */
            filter: invert(72%) sepia(5%) saturate(6%) hue-rotate(6deg) brightness(90%) contrast(94%);
        }

        [data-theme="dark"], body {
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        /* ── AIRPORT LABELS ON MAP ── */
        .map-airport-label {
            font-family: var(--font-mono);
            font-size: 9px;
            color: rgb(180, 180, 180);
            white-space: nowrap;
            pointer-events: none;
            /* Default dark mode shadow */
            text-shadow: 0 0 3px rgb(30, 30, 30), 0 0 3px rgb(30, 30, 30), 0 0 5px rgb(30, 30, 30);
        }

        [data-theme="light"] .map-airport-label {
            color: rgb(70, 70, 70); /* Darker text so it reads well */
            /* Clean white halo for light mode */
            text-shadow: 0 0 3px rgb(255, 255, 255), 0 0 3px rgb(255, 255, 255), 0 0 5px rgb(255, 255, 255);
        }


        /* ── GLOBAL RESET ── */
        *, *::before, *::after { 
            box-sizing: border-box; 
        }

        body {
            margin: 0; padding: 0;
            font-family: var(--font-mono);
            display: flex;
            flex-direction: row; 
            overflow: hidden;
            height: 100vh;
            letter-spacing: -0.5px;
        }

        /* ── LEFT PANEL (ROUTES) ── */
        #left-panel {
            width: 400px; height: 100%;
            background: var(--bg-dark);
            display: flex; flex-direction: column; flex-shrink: 0;
            border-right: 1px solid var(--border-main);
            z-index: 2000;
            font-family: var(--font-mono);
        }

        /* ── MAP SECTION ── */
        #map-container { flex-grow: 1; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; background: var(--bg-dark); }

        .leaflet-layer,
        .leaflet-control-zoom-in,
        .leaflet-control-zoom-out,
        .leaflet-control-attribution {
            filter: hue-rotate(000deg) brightness(100%) contrast(100%) saturate(00%); 
        }

        #loading {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: var(--bg-light); padding: 9px 14px; 
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 10px; font-family: var(--font-mono);
        }

        .map-overlay-btns {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            display: flex; gap: 6px;
        }
        .map-btn {
            -webkit-appearance: none;
            appearance: none;
            background-color: var(--bg-light);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 8px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-block;
            text-align: center;
            font-family: var(--font-mono);
            outline: none;         /* ← kills the default focus ring */
        }
        .map-btn:hover {
            background-color: var(--bg-hover);   /* ← subtle, not full inversion */
            color: var(--text-main);  
            border: 1px solid var(--text-main);
            outline: none;

        }
        .glow-active {
                    filter: drop-shadow(0 0 1px #fa9822) drop-shadow(0 0 4px #fa9822);
                    transition: filter 0.3s ease, stroke-width 0.2s ease;
                    z-index: 1000 !important;
        }
        .glow-inactive {
            filter: drop-shadow(0 0 1px #64c49a) drop-shadow(0 0 4px #64c49a);
            transition: filter 0.3s ease, stroke-width 0.2s ease;
        }


        /* ── RIGHT SIDEBAR (FILTERS) ── */
        #sidebar {
            width: 350px; height: 100%;
            background: var(--bg-dark);
            display: flex; flex-direction: column; flex-shrink: 0;
            border-left: 1px solid var(--border-main);
            z-index: 2000;
            font-family: var(--font-mono);
        }

        #filter-container {
            padding: 4px 10px 2px;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border-main);
            flex-shrink: 0; overflow-y: auto; max-height: 65%;
        }

        .filter-section { margin-bottom: 4px; }
        .filter-header-row { margin-bottom: 2px; }

        .filter-label {
            font-family: var(--font-sans);
            font-weight: bold;
            font-size: 10px;
            color: var(--text-main);
            letter-spacing: normal;
        }

        /* ── DATE RANGE ── */
        .date-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
        .date-row input[type="date"], input[type="text"] {
            flex: 1; padding: 3px 4px;
            border: 1px solid var(--border-main);
            font-size: 10px;
            font-family: var(--font-mono);
            color: var(--text-main); 
            background-color: var(--bg-light);
        }
        .date-row input[type="date"]:focus, input[type="text"]:focus {
            outline: none; border-color: var(--text-main);
        }
        .date-row span { font-size: 10px; color: var(--text-muted); }
        
        input[type="date"] {
            color-scheme: dark;
        }

        [data-theme="light"] input[type="date"] {
            color-scheme: light;
        }


        /* ── SEARCH INPUT ── */
        .tag-input-wrapper { position: relative; }
        .tag-input-row { display: flex; gap: 5px; height: 23px; }

        .tag-box {
            flex: 1;
            border: 0px solid var(--border-main); 
            background-color: var(--bg-light); cursor: text;
            display: flex; align-items: center; padding: 0;
        }

        .tag-text-input {
            border: none; outline: none; width: 100%; height: 100%;
            padding: 0 2px;
            font-size: 10px;
            font-family: var(--font-mono);
            background: transparent; color: var(--text-main);
        }
        .tag-text-input::placeholder { color: var(--text-muted); }

        /* Action Buttons */
        .action-btn {
            background-color: var(--bg-light);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            font-size: 10px; font-family: var(--font-mono);
            cursor: pointer; padding: 0 10px; transition: 0.2s;
        }
        .action-btn:hover {
            background-color: var(--text-main);
            color: var(--bg-dark);
        }
        .action-btn.btn-inc { border-color: var(--accent-green); color: var(--accent-green); }
        .action-btn.btn-exc { border-color: var(--exc-brd); color: var(--exc-txt); }
        .action-btn.btn-inc:hover { background-color: var(--accent-green); color: var(--bg-dark); }
        .action-btn.btn-exc:hover { background-color: var(--exc-brd); color: var(--bg-dark); }

        /* ── DROPDOWN ── */
        .tag-dropdown {
            display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            background: var(--bg-light);
            border: 1px solid var(--border-main);
            max-height: 350px; overflow-y: auto; z-index: 9999;
        }
        .tag-dropdown.open { display: block; }

        .dropdown-group-header {
            padding: 6px 10px 3px;
            font-size: 10px; font-weight: bold;
            font-family: var(--font-sans);
            color: var(--text-main); 
            background: var(--bg-dark);
            border-top: 1px solid var(--border-faint);
        }

        .dropdown-opt {
            padding: 7px 10px; cursor: pointer; font-size: 10px;
            font-family: var(--font-mono);
            display: flex; align-items: center; justify-content: space-between;
            color: var(--text-main); transition: background 0.1s;
        }
        .dropdown-opt:hover { background: var(--bg-hover); }

        .opt-badge { font-size: 10px; color: var(--text-muted); }

        .no-results {
            padding: 10px; font-size: 10px;
            color: var(--text-muted); text-align: center;
        }

        /* ── CHIPS ── */
        .tag-chip {
            display: flex; align-items: center; justify-content: space-between;
            padding: 4px 12px; font-size: 10px;
            font-family: var(--font-mono);
            background-color: var(--bg-light);
            border: 1px solid var(--border-main);
            color: var(--text-main);
            gap: 6px;
        }
        .tag-chip.mode-include { border-color: var(--accent-green); color: var(--accent-green); }
        .tag-chip.mode-exclude { border-color: var(--exc-brd); color: var(--exc-txt); }

        .chip-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: -0.5px; }
        .chip-actions { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }

        .chip-toggle, .chip-remove {
            background: none; border: none; cursor: pointer; padding: 1px 3px;
            font-size: 10px; line-height: 1;
            font-family: var(--font-mono);
            color: var(--text-main);
        }
        .chip-toggle:hover, .chip-remove:hover { 
            background: var(--text-main); color: var(--bg-dark); 
        }

        /* ── RESET BUTTON ── */
        .reset-btn {
            width: 100%; padding: 4px 6px;
            background-color: var(--bg-light);
            color: var(--text-main);
            border: 1px solid var(--border-main);
            cursor: pointer;
            font-size: 10px; font-family: var(--font-mono);
            transition: 0.2s; margin-top: 10px; margin-bottom: 200px;;
        }
        .reset-btn:hover {
            background: var(--text-main); color: var(--bg-dark); border-color: var(--text-main);

        }

        /* ── LEFT PANEL TABLE SECTION ── */
        #routes-label {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 15px; flex-shrink: 0;
            background: var(--bg-light);
            border-bottom: 1px solid var(--border-main);
            font-size: 10px; font-weight: bold;
            font-family: var(--font-sans);
            color: var(--text-main);
            padding-left: 7px;
        }
        .header-stats {
            display: flex; gap: 8px; align-items: center;
            font-family: var(--font-mono);
            font-weight: normal;
        }
        .header-stats span {
            color: var(--text-muted);
        }
        .header-stats .stat-divider {
            color: var(--border-main);
            font-size: 8px;
        }
        /* Ensure the main count stays green and bold */
        .header-stats #visible-routes-count {
            color: var(--accent-green) !important;
            font-weight: bold;
        }

        /* ── SECONDARY STATS BAR ── */
        #secondary-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* Changed to 3 equal columns */
            border-bottom: 1px solid var(--border-main);
            flex-shrink: 0;
            background: var(--bg-light);
        }
        .sec-stat-cell {
            padding: 5px 8px;
            overflow: hidden;
        }
        /* Only add a right border to items that aren't the last one */
        .sec-stat-cell:not(:last-child) {
            border-right: 1px solid var(--border-faint);
        }
        .sec-stat-label {
            color: var(--border-main);
            font-size: 8px;
        }
        .sec-stat-value {
            font-size: 10px;
            font-family: var(--font-mono);
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stat-arrow {
            width: 9px;
            height: 9px;
            color: var(--border-main);
            cursor: pointer;
            transition: color 0.2s;
        }
        .stat-arrow:hover {
            color: var(--text-main);
        }

        #visible-routes-count {
            color: var(--accent-green);
            font-family: var(--font-mono);
        }

        #sidebar-routes { padding: 0; overflow-y: auto; flex-grow: 1; background: var(--bg-dark); }

        table { 
            width: 100%; border-collapse: collapse; 
            font-size: 10px; font-family: var(--font-mono); 
            color: var(--text-main);
            table-layout: fixed;
        }

        th {
            padding: 7px 6px; 
            text-align: left;
            background: var(--bg-light);
            border-bottom: 1px solid var(--border-main);
            position: sticky; top: 0; z-index: 10;
            color: var(--text-main);
            letter-spacing: 0px;
            
            color: var(--border-main);
            font-size: 8px;
            font-family: var(--border-main);
            letter-spacing: -0.7px;
        }

        td {
            padding: 8px 6px; text-align: left;
            border-bottom: 1px solid var(--border-faint);
            background-color: var(--bg-dark);
            vertical-align: middle;
            letter-spacing: -0.5px;

            border-right: 1px solid rgba(131, 131, 131, 0.1);
        }
        
        /* ADDED: Zebra Striping for alternating backgrounds */
        /* Targets the 1st, 5th, 9th rows */
        .flight-row:nth-child(4n+1) td {
            background-color: var(--bg-dark); 
        }
        /* Targets the 3rd, 7th, 11th rows */
        .flight-row:nth-child(4n+3) td {
            background-color: rgb(36, 36, 36); /* Slightly lighter than bg-dark */
        }

        [data-theme="light"] .flight-row:nth-child(4n+3) td {
            background-color: rgb(225, 225, 225);
        }
        
        .flight-row td:first-child b { font-weight: normal; }
        
        /* Ensures the hover effect overwrites the zebra striping */
        .flight-row:hover td { background-color: var(--bg-hover) !important; cursor: pointer; color: var(--text-main); }




        
        .flight-row td:first-child b { font-weight: normal; }
        .flight-row:hover td { background-color: var(--bg-hover); cursor: pointer; color: var(--text-main); }

        /* Highlight for the table row */
        .flight-row.active-row td {
            background-color: rgba(250, 152, 34, 0.4) !important; 
            border-bottom: 1px solid rgba(250, 152, 34, 1.0);
            border-top: 1px solid rgba(250, 152, 34, 1.0);
        }

        .details-row td {
            background-color: var(--bg-light);
            border-bottom: 1px solid var(--border-main);
            padding: 12px;
            border: 1px solid rgba(250, 152, 34, 1.0);
        }

        /* ── AIRPORT HOVER INFO ── */
        #hover-airport-id { color: var(--accent-green) !important; font-size: 15px !important; }
        #sidebar-routes, 
        #filter-container, 
        .tag-dropdown {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;     /* Firefox */
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        #sidebar-routes::-webkit-scrollbar, 
        #filter-container::-webkit-scrollbar, 
        .tag-dropdown::-webkit-scrollbar {
            display: none;
        }

        /* ── AIRPORT HOVER INFO ── */
        #airport-hover-info {
            /* Mirrored from .tag-chip */
            padding: 4px 12px; 
            margin: 0 12px 12px 12px; 
            background-color: var(--bg-light);
            border: 1px solid var(--accent-green); 
            color: var(--accent-green); 
            font-family: var(--font-mono);
            font-size: 10px;
            align-items: center; 
            justify-content: space-between;
            gap: 6px;
        }

        #hover-airport-id { 
            font-weight: bold; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            /* Scaled down to match the chip text */
            font-size: 10px; 
        }

        #hover-airport-count {
            font-size: 9px; 
            color: var(--text-muted); 
            white-space: nowrap;
        }

        /* ── ZEN MODE (Hide UI) ── */
        body.ui-hidden #left-panel,
        body.ui-hidden #sidebar,
        body.ui-hidden .map-overlay-btns {
            display: none !important;
        }
    </style>
</head>
<body>

<div id="left-panel">
    <div id="routes-label">
        <div style="display: flex; align-items: center; gap: 5px;">
                <img src="/images/pfp.png" width="15" style="border-radius: 50%; transform: translateY(1px);" alt=" ">
                <span style="letter-spacing: 0px;">darkeyes</span>
        </div>
        <div class="header-stats">
            <span style="color: var(--text-main);"id="visible-flight-time" title="Total Flight Time">0h 0m</span>
            <span class="stat-divider">Flight Time |</span>
            <span style="color: var(--text-main);" id="visible-unique-dest" title="Unique Destinations">0</span>
            <span class="stat-divider">Unique Dest |</span>
            <span id="visible-routes-count" title="Total Visible Routes">0</span>
            <span class="stat-divider">Routes</span>
        </div>
    </div>

    <div id="secondary-stats">
        <div class="sec-stat-cell">
            <div class="sec-stat-label">Top Airport</div>
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <div class="sec-stat-value" style="flex: 1; min-width: 0; padding-right: 5px;">
                    <span id="rank-top-airport" style="color:var(--border-main); font-size:8px; margin-right:2px; display:none;">1.</span><span id="stat-top-airport">—</span>
                </div>
                <div style="display: flex; flex-direction: column; gap: 2px; flex-shrink: 0;">
                    <svg onclick="cycleStat('airport', -1)" class="stat-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                    <svg onclick="cycleStat('airport', 1)" class="stat-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </div>
            </div>
        </div>
        <div class="sec-stat-cell">
            <div class="sec-stat-label">Top Aircraft</div>
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <div class="sec-stat-value" style="flex: 1; min-width: 0; padding-right: 5px;">
                    <span id="rank-top-aircraft" style="color:var(--border-main); font-size:8px; margin-right:2px; display:none;">1.</span><span id="stat-top-aircraft">—</span>
                </div>
                <div style="display: flex; flex-direction: column; gap: 2px; flex-shrink: 0;">
                    <svg onclick="cycleStat('aircraft', -1)" class="stat-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                    <svg onclick="cycleStat('aircraft', 1)" class="stat-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </div>
            </div>
        </div>
        <div class="sec-stat-cell">
            <div class="sec-stat-label">Top Livery</div>
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <div class="sec-stat-value" style="flex: 1; min-width: 0; padding-right: 5px;">
                    <span id="rank-top-livery" style="color:var(--border-main); font-size:8px; margin-right:2px; display:none;">1.</span><span id="stat-top-livery">—</span>
                </div>
                <div style="display: flex; flex-direction: column; gap: 2px; flex-shrink: 0;">
                    <svg onclick="cycleStat('livery', -1)" class="stat-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                    <svg onclick="cycleStat('livery', 1)" class="stat-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </div>
            </div>

window.cycleCircleMode = function() {
    if (circleMode === 'auto') circleMode = 'show';
    else if (circleMode === 'show') circleMode = 'hide';
    else circleMode = 'auto';
    window.updateCircles();
};

window.updateCircles = function() {
    const iconElement = document.getElementById('toggle-icon');
    if (iconElement) {
        iconElement.outerHTML = modeIcons[circleMode];
    }

    var baseR, op;
    if (circleMode === 'hide') {
        baseR = 0; op = 0; 
    } else if (circleMode === 'show') {
        baseR = 1; op = 1;
    } else {
        var isZoomedIn = map.getZoom() > 3;
        baseR = isZoomedIn ? 2 : 0;
        op = isZoomedIn ? 1 : 0;
    }
    
    airportMarkers.forEach(function(marker) {
        var scaledPart = Math.sqrt(marker.flightCount) * .9;
        var cappedScaledPart = Math.min(scaledPart, 3);
        var finalRadius = baseR === 0 ? 0 : baseR + cappedScaledPart;
        
        marker.setRadius(finalRadius);
        marker.setStyle({ fillOpacity: op });
    });
};

window.cycleGlowMode = function() {
    if (glowMode === 'auto') glowMode = 'on';
    else if (glowMode === 'on') glowMode = 'off';
    else glowMode = 'auto';
    window.updateGlows();
};

window.toggleAirportLabels = function() {
    labelsVisible = !labelsVisible;
    var btn = document.getElementById('label-toggle');
    if (labelsVisible) {
        airportLabelGroup.addTo(map);
        btn.innerHTML = labelIcons['on'];
    } else {
        if (map.hasLayer(airportLabelGroup)) map.removeLayer(airportLabelGroup);
        btn.innerHTML = labelIcons['off'];
    }
};


window.updateGlows = function() {
    const btn = document.getElementById('glow-toggle');
    if (btn) {
        btn.innerHTML = glowIcons[glowMode];
    }

    flightLayers.forEach(function(item, idx) {
        if (!item || !item.layers) return;
        
        var isSelected = window.selectedFlightIndices.has(idx);
        var isHovered = (window.hoveredFlightIndex === idx);
        var isActive = isSelected || isHovered;

        item.layers.forEach(function(l) {
            var el = l.getElement();
            if (!el) return;

            if (glowMode === 'on') {
                if (isActive) {
                    el.classList.add('glow-active');
                    el.classList.remove('glow-inactive');
                } else {
                    el.classList.add('glow-inactive');
                    el.classList.remove('glow-active');
                }
            } else if (glowMode === 'auto') {
                if (isActive) {
                    el.classList.add('glow-active');
                    el.classList.remove('glow-inactive');
                } else {
                    el.classList.remove('glow-active', 'glow-inactive');
                }
            } else {
                el.classList.remove('glow-active', 'glow-inactive');
            }
        });
    });
};
// ═══════════════════════════════════════════════════════════
// FILTER STATE & TAG INPUT COMPONENT
// ═══════════════════════════════════════════════════════════
var filterState = {
    aircraft: { includes: new Set(), excludes: new Set() },
    airline:  { includes: new Set(), excludes: new Set() },
    airport:  { includes: new Set(), excludes: new Set() }
};
var filterHistory = [];
var tagInputs = {};

function TagInput(filterKey, wrapper, options) {
    this.filterKey = filterKey;
    this.wrapper   = wrapper;
    this.options   = options; 
    this.stagedValue = null; 
    this._init();
}

TagInput.prototype._init = function() {
    var self = this;
    this.wrapper.innerHTML = ''; 

    var row = document.createElement('div');
    row.className = 'tag-input-row';

    var box = document.createElement('div');
    box.className = 'tag-box';

    var input = document.createElement('input');
    input.type = 'text';
    input.className = 'tag-text-input';
    input.placeholder = 'Search...';
    box.appendChild(input);

    var btnInc = document.createElement('button');
    btnInc.className = 'action-btn btn-inc';
    btnInc.textContent = 'INC';

    var btnExc = document.createElement('button');
    btnExc.className = 'action-btn btn-exc';
    btnExc.textContent = 'EXC';

    var dropdown = document.createElement('div');
    dropdown.className = 'tag-dropdown';

    row.appendChild(box);
    row.appendChild(btnInc);
    row.appendChild(btnExc);
    this.wrapper.appendChild(row);
    this.wrapper.appendChild(dropdown);

    this._input    = input;
    this._dropdown = dropdown;

    input.addEventListener('input', function() { 
        self.stagedValue = null; 
        self._updateDropdown(this.value); 
    });
    input.addEventListener('focus', function() { self._updateDropdown(this.value); });
    input.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') { dropdown.classList.remove('open'); input.blur(); }
    });

    document.addEventListener('click', function(e) {
        if (!self.wrapper.contains(e.target)) dropdown.classList.remove('open');
    });

    box.addEventListener('click', function(e) {
        if (e.target === box) input.focus();
    });

    function triggerAdd(mode) {
        var val = self.stagedValue;
        if (!val) {
            var q = input.value.toLowerCase().trim();
            var exactMatch = self.options.find(function(o) { return o.label.toLowerCase() === q; });
            if (exactMatch) val = exactMatch.value;
        }

        if (val) {
            self.addTag(val, mode);
            self.stagedValue = null;
            self._updateDropdown(input.value);
            input.focus();
        } else {
            input.focus();
        }
    }

    btnInc.addEventListener('click', function() { triggerAdd('include'); });
    btnExc.addEventListener('click', function() { triggerAdd('exclude'); });
};

TagInput.prototype._updateDropdown = function(query) {
    var self = this;
    var incs = filterState[this.filterKey].includes;
    var excs = filterState[this.filterKey].excludes;
    var q    = query.toLowerCase().trim();

    var filtered = this.options.filter(function(opt) {
        if (incs.has(opt.value) || excs.has(opt.value)) return false;
        if (!q) return true;
        return opt.label.toLowerCase().includes(q);
    }).slice(0, 12);

    if (filtered.length === 0) {
        this._dropdown.innerHTML = '<div class="no-results">No matches</div>';
        this._dropdown.classList.add('open');
        return;
    }

    var groups = {}, groupOrder = [];
    filtered.forEach(function(opt) {
        var grp = opt.badge || '';
        if (!groups[grp]) { groups[grp] = []; groupOrder.push(grp); }
        groups[grp].push(opt);
    });
    var multipleGroups = groupOrder.length > 1;

    var html = '';
    groupOrder.forEach(function(grp) {
        if (multipleGroups && grp) {
            html += '<div class="dropdown-group-header">' + escapeHtml(grp) + '</div>';
        }
        groups[grp].forEach(function(opt) {
            html += '<div class="dropdown-opt" data-value="' + escapeHtml(opt.value) + '">' +
                '<span class="opt-label">' + escapeHtml(opt.label) + '</span>' +
                (opt.badge && !multipleGroups ? '<span class="opt-badge">' + escapeHtml(opt.badge) + '</span>' : '') +
                '</div>';
        });
    });

    this._dropdown.innerHTML = html;
    this._dropdown.querySelectorAll('.dropdown-opt').forEach(function(el) {
        el.addEventListener('click', function(e) {
            self.stagedValue = this.getAttribute('data-value');
            self._dropdown.querySelectorAll('.dropdown-opt').forEach(function(opt) {
                opt.style.background = ''; 
            });
            this.style.background = 'var(--bg-hover)';
            self._input.focus();
        });
    });
    this._dropdown.classList.add('open');
};

TagInput.prototype.addTag = function(value, mode) {
    var state = filterState[this.filterKey];
    if (mode === 'include') {
        state.includes.add(value);
        state.excludes.delete(value);
    } else {
        state.excludes.add(value);
        state.includes.delete(value);
    }
    
    filterHistory = filterHistory.filter(function(h) { return !(h.key === this.filterKey && h.value === value); }.bind(this));
    filterHistory.push({ key: this.filterKey, value: value, mode: mode });

    if (window.renderAllActiveFilters) window.renderAllActiveFilters();
    if (window.applyFiltersGlobal) window.applyFiltersGlobal();
};

TagInput.prototype.removeTag = function(value, mode) {
    if (mode === 'include') filterState[this.filterKey].includes.delete(value);
    else filterState[this.filterKey].excludes.delete(value);
    
    filterHistory = filterHistory.filter(function(h) { return !(h.key === this.filterKey && h.value === value); });

    if (window.renderAllActiveFilters) window.renderAllActiveFilters();
    if (window.applyFiltersGlobal) window.applyFiltersGlobal();
};

function toggleFilterState(filterKey, value, currentMode) {
    var newMode = currentMode === 'include' ? 'exclude' : 'include';
    if (currentMode === 'include') {
        filterState[filterKey].includes.delete(value);
        filterState[filterKey].excludes.add(value);
    } else {
        filterState[filterKey].excludes.delete(value);
        filterState[filterKey].includes.add(value);
    }
    
    filterHistory = filterHistory.filter(function(h) { return !(h.key === filterKey && h.value === value); });
    filterHistory.push({ key: filterKey, value: value, mode: newMode });

    window.renderAllActiveFilters();
    if (window.applyFiltersGlobal) window.applyFiltersGlobal();
}

window.renderAllActiveFilters = function() {
    var container = document.getElementById('active-filters-list');
    if (!container) return;
    container.innerHTML = '';
    
    var hasFilters = false;
    let filterCount = 0; 

    function createGlobalChip(mainText, subText, modeClass, onRemove, onToggle) {
        var chip = document.createElement('div');
        chip.className = 'tag-chip mode-' + modeClass;
        chip.style.alignItems = 'center';

        var labelContainer = document.createElement('div');
        labelContainer.style.display = 'flex';
        labelContainer.style.flexDirection = 'column';
        labelContainer.style.flex = '1';
        labelContainer.style.overflow = 'hidden';
        labelContainer.style.gap = '2px';
        
        var mainSpan = document.createElement('span');
        mainSpan.textContent = mainText;
        mainSpan.style.whiteSpace = 'nowrap';
        mainSpan.style.overflow = 'hidden';
        mainSpan.style.textOverflow = 'ellipsis';
        mainSpan.style.fontWeight = 'bold';
        labelContainer.appendChild(mainSpan);

        if (subText) {
            var subSpan = document.createElement('span');
            subSpan.textContent = subText;
            subSpan.style.fontSize = '9px'; 
            subSpan.style.color = 'var(--text-muted)';
            subSpan.style.whiteSpace = 'nowrap';
            subSpan.style.overflow = 'hidden';
            subSpan.style.textOverflow = 'ellipsis';
            labelContainer.appendChild(subSpan);
        }

        chip.appendChild(labelContainer);

        var actionsDiv = document.createElement('div');
        actionsDiv.className = 'chip-actions';

        if (onToggle) {
            var toggleBtn = document.createElement('button');
            toggleBtn.className = 'chip-toggle';
            toggleBtn.innerHTML = 'SWP';
            toggleBtn.addEventListener('click', function(e) { e.stopPropagation(); onToggle(); });
            actionsDiv.appendChild(toggleBtn);
        }

        var btn = document.createElement('button');
        btn.className = 'chip-remove';
        btn.innerHTML = 'X';
        btn.addEventListener('click', function(e) { e.stopPropagation(); onRemove(); });
        actionsDiv.appendChild(btn);

        chip.appendChild(actionsDiv);
        return chip;
    }

    var sd = document.getElementById('start-date').value;
    var ed = document.getElementById('end-date').value;
    if (sd || ed) {
        hasFilters = true;
        filterCount++;
        var dateSubText = (sd || 'Any') + ' > ' + (ed || 'Any');
        container.appendChild(createGlobalChip('Date Range', dateSubText, 'include', function() {
            document.getElementById('start-date').value = '';
            document.getElementById('end-date').value = '';
            window.renderAllActiveFilters();
            if (window.applyFiltersGlobal) window.applyFiltersGlobal();
        }, null));
    }

    ['aircraft', 'airline', 'airport'].forEach(function(key) {
        var state = filterState[key];
        
        function renderTags(set, mode) {
            set.forEach(function(val) {
                hasFilters = true;
                filterCount++; 
                var opt = tagInputs[key].options.find(function(o) { return o.value === val; });
                var fullLabel = opt ? opt.label : val;
                
                var mainText = fullLabel;
                var subText = null;

                if (key === 'airport' && fullLabel.includes(' - ')) {
                    var parts = fullLabel.split(' - ');
                    mainText = parts[0];
                    subText = parts.slice(1).join(' - ');
                }

                container.appendChild(createGlobalChip(mainText, subText, mode, function() {
                    tagInputs[key].removeTag(val, mode);
                }, function() { toggleFilterState(key, val, mode); }));
            });
        }

        renderTags(state.includes, 'include');
        renderTags(state.excludes, 'exclude');
    });

    const sidebarToggle = document.getElementById('sidebar-toggle');
    if (sidebarToggle) {
        sidebarToggle.textContent = `FILTERS (${filterCount}) >`;
    }
};

function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function greatCirclePoints(lat1, lon1, lat2, lon2, n) {
    var R = Math.PI/180, D = 180/Math.PI;
    var p1=lat1*R, l1=lon1*R, p2=lat2*R, l2=lon2*R;
    var dp=p2-p1, dl=l2-l1;
    var a = Math.sin(dp/2)*Math.sin(dp/2) + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)*Math.sin(dl/2);
    var d = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    if (d < 0.001) return [[lat1,lon1],[lat2,lon2]];
    var pts = [];
    for (var i=0; i<=n; i++) {
        var f=i/n, A=Math.sin((1-f)*d)/Math.sin(d), B=Math.sin(f*d)/Math.sin(d);
        var x=A*Math.cos(p1)*Math.cos(l1)+B*Math.cos(p2)*Math.cos(l2);
        var y=A*Math.cos(p1)*Math.sin(l1)+B*Math.cos(p2)*Math.sin(l2);
        var z=A*Math.sin(p1)+B*Math.sin(p2);
        pts.push([Math.atan2(z,Math.sqrt(x*x+y*y))*D, Math.atan2(y,x)*D]);
    }
    return pts;
}

function makeContinuous(pts) {
    if (!pts || pts.length === 0) return pts;
    var contPts = [[pts[0][0], pts[0][1]]];
    var currentOffset = 0;
    for (var i = 1; i < pts.length; i++) {
        var prevLon = contPts[i-1][1];
        var currLon = pts[i][1] + currentOffset;
        if (currLon - prevLon > 180) { currentOffset -= 360; currLon -= 360; } 
        else if (prevLon - currLon > 180) { currentOffset += 360; currLon += 360; }
        contPts.push([pts[i][0], currLon]);
    }
    return contPts;
}

function makeRoundedRectPoints(lat, lon, halfH, halfW, cornerR, n) {
    var pts = [];
    var corners = [
        { cy: lat + halfH - cornerR, cx: lon + halfW - cornerR, a0: 0,           a1: Math.PI/2 },
        { cy: lat + halfH - cornerR, cx: lon - halfW + cornerR, a0: Math.PI/2,  a1: Math.PI },
        { cy: lat - halfH + cornerR, cx: lon - halfW + cornerR, a0: Math.PI,    a1: 3*Math.PI/2 },
        { cy: lat - halfH + cornerR, cx: lon + halfW - cornerR, a0: 3*Math.PI/2, a1: 2*Math.PI }
    ];

    corners.forEach(function(c) {
        for (var i = 0; i <= n; i++) {
            var a = c.a0 + (i / n) * (c.a1 - c.a0);
            pts.push([c.cy + cornerR * Math.sin(a), c.cx + cornerR * Math.cos(a)]);
        }
    });

    pts.push(pts[0]);
    return pts;
}

function getTpSize() {
    var z = map.getZoom();
    var scale = Math.pow(2, 10 - z) * 0.004; 
    scale = Math.max(0.004, Math.min(scale, 0.08)); 
    return { 
        halfH: scale * 2.5,
        halfW: scale * 1.2,
        cornerR: scale * 1.0
    }
}


function getAircraftDetails(rawName) {
    if (!rawName || !rawName.trim()) return { mfr:null, family:null, specific:'Unknown' };
    var n=rawName.toLowerCase(), mfr=null, family=null, specific=formatAircraft(rawName);
    if      (n.includes('boeing'))      mfr='Boeing';
    else if (n.includes('airbus'))      mfr='Airbus';
    else if (n.includes('embraer'))     mfr='Embraer';
    else if (n.includes('bombardier'))  mfr='Bombardier';
    else if (n.includes('cessna'))      mfr='Cessna';
    else if (n.includes('mcdonnell douglas'))      mfr='McDonnell Douglas';
    if (mfr==='Airbus') {
        if      (n.match(/a318|a319|a320|a321/)) family='A320 Family';
        else if (n.includes('a220'))             family='A220 Family';
        else if (n.includes('a330'))             family='A330 Family';
        else if (n.includes('a350'))             family='A350 Family';
        else if (n.includes('a380'))             family='A380 Family';
    } else if (mfr==='Boeing') {
        if      (n.includes('737')) family='737 Family';
        else if (n.includes('747')) family='747 Family';
        else if (n.includes('757')) family='757 Family';
        else if (n.includes('767')) family='767 Family';
        else if (n.includes('777')) family='777 Family';
        else if (n.includes('787')) family='787 Family';
    } else if (mfr==='Embraer') {
        if (n.match(/e170|e175|e190|e195/)) family='E-Jet Family';
    } else if (mfr==='Bombardier') {
        if (n.includes('cl350')||n.includes('challenger')) family='Challenger Family';
    } 
    return { mfr, family, specific };
}

function formatAircraft(name) {
    if (!name) return 'Unknown';
    var mfrs=['Boeing','Airbus','Bombardier','Embraer','Cessna','SCOATA Daher',
              'Lockheed Martin','Piper','Cub Crafters','Supermarine','McDonnell Douglas'];
    var s=name;
    mfrs.forEach(function(m){ s=s.replace(new RegExp('^'+m+'\\s+','i'),''); });
    if (s.toLowerCase()==='spitfire spitfire') return 'Spitfire';
    return s;
}

function truncateText(str, maxLength) {
    if (!str) return '—';
    if (str.length <= maxLength) return str;
    let truncated = str.substring(0, maxLength);
    let lastSpaceIndex = truncated.lastIndexOf(' ');
    if (lastSpaceIndex > -1) {
        truncated = truncated.substring(0, lastSpaceIndex);
    }
    return truncated; 
}

function renderVisibleRoutes(filteredFlights) {
    var container = document.getElementById('sidebar-routes');
    var countSpan = document.getElementById('visible-routes-count');
    var timeSpan = document.getElementById('visible-flight-time');
    var destSpan = document.getElementById('visible-unique-dest');

// ── TOP STATS ──────────────────────────────────────────
    (function() {
        function getRankedList(vals) {
            if (!vals.length) return [];
            var counts = {};
            vals.forEach(function(v) { if (v) counts[v] = (counts[v] || 0) + 1; });
            
            var sortedKeys = Object.keys(counts).sort(function(a, b) { 
                // Sort by count descending, then alphabetically ascending
                if (counts[b] !== counts[a]) return counts[b] - counts[a];
                return a.localeCompare(b);
            });

            // Map the sorted keys into an object with the name and the count
            return sortedKeys.map(function(key) {
                return { name: key, count: counts[key] };
            });
        }
        var airports = [];
        filteredFlights.forEach(function(f) {
            if (f.departure) airports.push(f.departure);
            if (f.arrival)   airports.push(f.arrival);
        });

        window.statsData.airport.list = getRankedList(airports);
        window.statsData.airport.index = 0;

        // Skip ATC sessions for Aircraft stats
        window.statsData.aircraft.list = getRankedList(filteredFlights.filter(f => !f.isATC).map(function(f){ return formatAircraft(f.aircraft); }));
        window.statsData.aircraft.index = 0;

        window.statsData.livery.list = getRankedList(filteredFlights.map(function(f){ return f.livery; }));
        window.statsData.livery.index = 0;

        updateStatDisplay('airport');
        updateStatDisplay('aircraft');
        updateStatDisplay('livery');
    })();
    // ── END TOP STATS ──────────────────────────────────────

    var totalMinutes = 0;
    var uniqueDest = new Set();
    var routeCount = 0;

    filteredFlights.forEach(function(f) {
        if (!f.isATC) {
            routeCount++;
            if (f.duration) {
                var timeParts = f.duration.split(':');
                if (timeParts.length === 2) {
                    var hrs = parseInt(timeParts[0], 10);
                    var mins = parseInt(timeParts[1], 10);
                    if (!isNaN(hrs) && !isNaN(mins)) {
                        totalMinutes += (hrs * 60) + mins;
                    }
                }
            }
            if (f.arrival) {
                uniqueDest.add(f.arrival);
            }
        }
    });

    var totalHrs = Math.floor(totalMinutes / 60);
    var totalMins = totalMinutes % 60;
    var timeString = totalHrs + 'h ' + totalMins + 'm';

    countSpan.textContent = routeCount;
    timeSpan.textContent = timeString;
    destSpan.textContent = uniqueDest.size;

    if (filteredFlights.length === 0) {
        container.innerHTML = '<p style="color:var(--text-muted);text-align:center;margin-top:30px;font-size:12px;">No data.</p>';
        return;
    }

    var routeCounts = {};
    filteredFlights.forEach(function(f) {
        var pair = [f.departure, f.arrival].sort();
        var key = pair[0] + '-' + pair[1];
        routeCounts[key] = (routeCounts[key] || 0) + 1;
    });

var html = '<table><thead><tr><th style="width: 65px;">Date</th><th style="width: 90px;">Route</th><th style="width: 45px;">Aircraft</th><th style="width: 150px;">Livery</th></tr></thead><tbody>';
    
    filteredFlights.forEach(function(item, idx) {
       var pair = [item.departure, item.arrival].sort();
        var key = pair[0] + '-' + pair[1];
        var isDuplicateOrBidirectional = routeCounts[key] > 1;
        
        var depColor = 'var(--text-main)';
        var arrColor = 'var(--text-main)';
        
        var depIsFiltered = filterState.airport.includes.has(item.departure);
        var arrIsFiltered = filterState.airport.includes.has(item.arrival);

        var spokeColor = isDuplicateOrBidirectional ? '#5ba4ff' : 'var(--accent-green)';

        if (depIsFiltered || arrIsFiltered) {
            if (depIsFiltered && !arrIsFiltered) {
                depColor = 'var(--text-main)';
                arrColor = spokeColor;
            } else if (!depIsFiltered && arrIsFiltered) {
                arrColor = 'var(--text-main)';
                depColor = spokeColor;
            } else {
                depColor = spokeColor;
                arrColor = spokeColor;
            }
        } else if (isDuplicateOrBidirectional) {
            depColor = '#5ba4ff';
            arrColor = '#5ba4ff';
        }

        html += '<tr class="flight-row" data-index="'+idx+'">';

                            <span style="grid-column: span 4; border-bottom: 1px solid var(--border-faint); margin: 1px 0;"></span>
                            <span style="color: var(--text-muted);">TIME</span><span>${escapeHtml(item.duration || 'N/A')}</span>
                            <span style="color: var(--text-muted);">OPS</span><span>${escapeHtml(item.ops || '0')}</span>
<span style="grid-column: span 4; border-bottom: 1px solid var(--border-faint); margin: 1px 0;"></span><span style="color: var(--text-muted);">RMK</span><span style="grid-column: span 3; font-family: 'Shadows Into Light', cursive; letter-spacing: 1px;">${escapeHtml(item.remarks || '')}</span>                        </div>
                    </div>
                `;
            } else {
                html += `
                    <div style="font-size: 10px; line-height: 1.8; color: var(--text-main);">
                        <div style="display: grid; grid-template-columns: 50px 1fr 50px 1fr; gap: 2px 4px;">
                            <span style="color: var(--text-muted);">DATE</span><span style="grid-column: span 3;">${escapeHtml(item.date)}</span>
                            <span style="grid-column: span 4; border-bottom: 1px solid var(--border-faint); margin: 1px 0;"></span>
                            <span style="color: var(--text-muted);">DEP</span><span style="grid-column: span 3;">${escapeHtml(depLabel)}</span>
                            <span style="color: var(--text-muted);">ARR</span><span style="grid-column: span 3;">${escapeHtml(arrLabel)}</span>
                            <span style="grid-column: span 4; border-bottom: 1px solid var(--border-faint); margin: 1px 0;"></span>

                            <span style="color: var(--text-muted);">LIVRY</span><span>${escapeHtml(item.livery, 18)}</span>
                            <span style="grid-column: span 4; border-bottom: 1px solid var(--border-faint); margin: 1px 0;"></span>
                            <span style="color: var(--text-muted);">TIME</span><span>${escapeHtml(item.duration || 'N/A')}</span>
                            <span style="color: var(--text-muted);">LDGS</span><span>${escapeHtml(item.ldgs || 'N/A')}</span>
<span style="grid-column: span 4; border-bottom: 1px solid var(--border-faint); margin: 1px 0;"></span><span style="color: var(--text-muted);">RMK</span><span style="grid-column: span 3; font-family: 'Shadows Into Light', cursive; letter-spacing: 1px;">${escapeHtml(item.remarks || '')}</span>                        </div>
                    </div>
                `;
            }
        })();
        html += '</td></tr>';
    });
    html += '</tbody></table>';

    container.innerHTML = html;

    container.querySelectorAll('.flight-row').forEach(function(row){
        var idx = parseInt(row.getAttribute('data-index'));
        
        row.addEventListener('mouseenter', function(){
            this.classList.add('active-row'); 
            window.hoveredFlightIndex = idx;
            if (flightLayers[idx]) {
                flightLayers[idx].layers.forEach(function(l) { 
                    l.setStyle({color:'#fa9822',weight:1,opacity:1}).bringToFront();
                });
            }
            window.updateGlows();
        });

        row.addEventListener('mouseleave', function(){
            if (window.hoveredFlightIndex === idx) {
                window.hoveredFlightIndex = null;
            }

            if (!window.selectedFlightIndices.has(idx)) {
                this.classList.remove('active-row');
                if (flightLayers[idx]) {
                    flightLayers[idx].layers.forEach(function(l) { 
                        l.setStyle({color:'#64c49a',weight:1,opacity:0.5});

            }
            window.updateGlows();

            if (!isCurrentlyOpen) {
                // Open the specific row
                detailsRow.style.display = 'table-row';
                this.classList.add('active-row'); 
                window.selectedFlightIndices.add(idx);
                window.hoveredFlightIndex = idx;
                if (flightLayers[idx]) {
                    flightLayers[idx].layers.forEach(function(l) { 
                        l.setStyle({color:'#fa9822',weight:1,opacity:1}).bringToFront();
                    });
                }
            } else {
                // Close the specific row if clicked again
                detailsRow.style.display = 'none';
                this.classList.remove('active-row');
                window.selectedFlightIndices.delete(idx);
                if (flightLayers[idx]) {
                    flightLayers[idx].layers.forEach(function(l) {

// ═══════════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════════
// MODIFIED: Fetch BOTH standard flights and ATC logs concurrently
Promise.all([
    new Promise((resolve) => Papa.parse(googleSheetUrl, { download: true, header: false, complete: resolve, error: function(){ resolve({data:[]}); } })),
    new Promise((resolve) => Papa.parse(atcSheetUrl, { download: true, header: false, complete: resolve, error: function(){ resolve({data:[]}); } }))
]).then(function(results) {
    var flightSheetResults = results[0];
    var atcSheetResults = results[1];

    var flights = [];
    
    var codeAliases = {
        'EGOD': 'EGFD',
        'NZIR': 'NZWD', 
        'O5U': '05U', 
    };
    
    var originalIndex = 0;

    // Process Flights
    flightSheetResults.data.forEach(function(row){
        if (row.length>=7 && row[5] && row[6] && row[5].trim()!=='' && row[6].trim()!=='') {
            var rawDep = row[5].trim().toUpperCase();
            var rawArr = row[6].trim().toUpperCase();

            flights.push({
                _rawIndex: originalIndex++,
                isATC: false,
                date:      (row[0]||'').trim() || 'Unknown',
                duration:  (row[1]||'').trim(), 
                aircraft:  ((row[2]||'').trim()+' '+(row[3]||'').trim()).trim(),
                livery:    (row[4]&&row[4].trim()) ? row[4].trim() : 'Standard',
                departure: codeAliases[rawDep] || rawDep,
                arrival:   codeAliases[rawArr] || rawArr,
                ldgs:      (row[7]||'').trim(), 
                remarks:   (row[9]||'').trim()  
            });
        }
    });

    // Process ATC
    atcSheetResults.data.forEach(function(row) {
        // Expected Cols: 0=Date, 1=Duration, 2=Station, 3=Airport, 4=Ops Reports, 5=Additional Controllers, 6=Remarks
        if (row.length >= 4 && row[3] && row[3].trim() !== '' && row[0].toLowerCase() !== 'date') {
            var rawAp = row[3].trim().toUpperCase();
            var remarksCombined = [];
            
            // Loop through column 5 (Additional Controllers) and beyond to catch all remarks/notes
            for (var i = 5; i < row.length; i++) {
                if (row[i] && row[i].trim() !== '') {
                    remarksCombined.push(row[i].trim());
                }
            }

            flights.push({
                _rawIndex: originalIndex++,
                isATC: true,
                date:      (row[0]||'').trim() || 'Unknown',
                duration:  (row[1]||'').trim(),
                aircraft:  '', // Leave blank per request
                livery:    (row[2]||'').trim(), // Station (Used for Livery rendering logic)
                station:   (row[2]||'').trim(), 
                departure: codeAliases[rawAp] || rawAp,
                arrival:   codeAliases[rawAp] || rawAp, 
                ops:       (row[4]||'').trim(),
                remarks:   remarksCombined.join(", ") // Joins them with a comma and space
            });
        }
    });
    
    // Unified sorting
    flights.sort(function(a, b) {
        var dateA = new Date(a.date);
        var dateB = new Date(b.date);
        if (isNaN(dateA)) return 1;
        if (isNaN(dateB)) return -1;
        
        if (dateB.getTime() === dateA.getTime()) {
            return b._rawIndex - a._rawIndex; 
        }
        
        return dateB - dateA;
    });

    Papa.parse('https://raw.githubusercontent.com/davidmegginson/ourairports-data/main/airports.csv', {
        download: true, header: true,
        complete: function(airportResults) {
            document.getElementById('loading').style.display='none';
            window.airportData = {};
            var airportData = window.airportData;
            airportResults.data.forEach(function(row) {
                if (!row.ident) return;
                
                var continentMap = {
                    'NA': 'North America', 'SA': 'South America', 
                    'EU': 'Europe', 'AS': 'Asia', 
                    'AF': 'Africa', 'OC': 'Oceania', 'AN': 'Antarctica'
                };

                var countryName = row.iso_country;
                if (row.iso_country) {
                    try {
                        countryName = new Intl.DisplayNames(['en'], {type: 'region'}).of(row.iso_country);
                    } catch(e) { }
                }

                var apObj = { 
                    lat: parseFloat(row.latitude_deg), 
                    lon: parseFloat(row.longitude_deg), 
                    name: row.name || row.ident,
                    continent: continentMap[row.continent] || 'Unknown Region',
                    country: countryName,
                    municipality: (row.municipality || '').trim()
                };
                
                airportData[row.ident.trim().toUpperCase()] = apObj;
                
                if (row.gps_code && row.gps_code.trim() !== '') {
                    airportData[row.gps_code.trim().toUpperCase()] = apObj;
                }
                
                if (row.iata_code && row.iata_code.trim() !== '') {
                    airportData[row.iata_code.trim().toUpperCase()] = apObj;
                }

                if (row.local_code && row.local_code.trim() !== '') {
                    airportData[row.local_code.trim().toUpperCase()] = apObj;
                }
            });

            var mfrSet=new Set(), famSet=new Set(), spcSet=new Set(), airlineSet=new Set();
            var apSet=new Set(), regSet=new Set(), ctySet=new Set();

            flights.forEach(function(f){
                // Only compile aircraft stats for real flights
                if (!f.isATC) {
                    var d=getAircraftDetails(f.aircraft);
                    if (d.mfr) mfrSet.add(d.mfr); if (d.family) famSet.add(d.family); if (d.specific) spcSet.add(d.specific);
                }
                
                if (f.livery) airlineSet.add(f.livery); // Treat ATC station as livery
                
                if (f.departure) {
                    apSet.add(f.departure);
                    if (airportData[f.departure]) {
                        regSet.add(airportData[f.departure].continent);
                        ctySet.add(airportData[f.departure].country);
                    }
                }
                if (f.arrival) {
                    apSet.add(f.arrival);
                    if (airportData[f.arrival]) {
                        regSet.add(airportData[f.arrival].continent);
                        ctySet.add(airportData[f.arrival].country);
                    }
                }
            });


            var aircraftOptions=[];
            Array.from(mfrSet).sort().forEach(function(v){ aircraftOptions.push({value:'mfr:'+v, label:v, badge:'Manufacturer'}); });
            Array.from(famSet).sort().forEach(function(v){ aircraftOptions.push({value:'fam:'+v, label:v, badge:'Family'}); });
            Array.from(spcSet).sort().forEach(function(v){ aircraftOptions.push({value:'spc:'+v, label:v, badge:'Type'}); });

            var airlineOptions = Array.from(airlineSet).sort().map(function(v){ return {value:v, label:v, badge:null}; });
            
            var airportOptions = [];
            Array.from(regSet).sort().forEach(function(v){ if(v) airportOptions.push({value:'reg:'+v, label:v, badge:'Region'}); });
            Array.from(ctySet).sort().forEach(function(v){ if(v) airportOptions.push({value:'cty:'+v, label:v, badge:'Country'}); });
            Array.from(apSet).sort().forEach(function(icao){
                var ap=airportData[icao];
                var label = icao;
                if (ap) {
                    label = icao + ' - ' + ap.name;
                    if (ap.municipality) label += ' (' + ap.municipality + ')';
                }
                airportOptions.push({value:icao, label: label, badge:'Airport'});
            });

            tagInputs.aircraft = new TagInput('aircraft', document.getElementById('aircraft-wrapper'), aircraftOptions);
            tagInputs.airline  = new TagInput('airline',  document.getElementById('airline-wrapper'),  airlineOptions);
            tagInputs.airport  = new TagInput('airport',  document.getElementById('airport-wrapper'),  airportOptions);

            ['start-date','end-date'].forEach(function(id){
                document.getElementById(id).addEventListener('change', function(){
                    if (window.renderAllActiveFilters) window.renderAllActiveFilters();
                    if (window.applyFiltersGlobal) window.applyFiltersGlobal();
                });
            });

            var drawnLayers = L.layerGroup().addTo(map);
            
            airportLabelGroup = L.layerGroup();

            function renderMap(filteredFlights) {
                window.closeAllFlightDetails(); 
                drawnLayers.clearLayers();
                flightLayers=[];
                airportMarkers = [];
                tpLayers = [];

                airportLabelGroup.clearLayers();

                var counts={};
                filteredFlights.forEach(function(f){
                    if (airportData[f.departure]&&airportData[f.arrival]) {
                        counts[f.departure]=(counts[f.departure]||0)+1;
                        counts[f.arrival]  =(counts[f.arrival]||0)+1;
                    }
                });

                var drawn={};
                var mapOffsets = [-360, 0, 360];

                filteredFlights.forEach(function(f){
                    var dep=airportData[f.departure], arr=airportData[f.arrival];
                    if (!dep||!arr) { flightLayers.push(null); return; }

                    [f.departure,f.arrival].forEach(function(id){
                        if (drawn[id]) return;
                        var cnt=counts[id]||0;

                        mapOffsets.forEach(function(offset) {
                            var marker=L.circleMarker([airportData[id].lat, airportData[id].lon + offset],{
                                stroke: false, fillColor:'#7b8794', radius: 0, fillOpacity: 0
                            });
                            marker.flightCount = cnt; 
                            airportMarkers.push(marker); 

                            marker.on('mouseover', function() {
                                document.getElementById('hover-airport-id').innerText = id;
                                document.getElementById('hover-airport-count').innerText = cnt + ' RTES';
                                document.getElementById('airport-hover-info').style.display = 'block';
                            });
                            marker.on('mouseout', function() { document.getElementById('airport-hover-info').style.display = 'none'; });
                            marker.on('click', function() { tagInputs.airport.addTag(id, 'include'); });
                            drawnLayers.addLayer(marker);
                        });

                        mapOffsets.forEach(function(offset) {
                            var labelMarker = L.marker(
                                [airportData[id].lat, airportData[id].lon + offset],
                                {
                                    icon: L.divIcon({
                                        className: '',
                                        html: '<div class="map-airport-label">' + escapeHtml(id) + '</div>',
                                        iconSize: [0, 0],
                                        iconAnchor: [-5, 5]
                                    }),
                                    interactive: false,
                                    zIndexOffset: -100
                                }
                            
                            );
                            airportLabelGroup.addLayer(labelMarker);
                        });

                        drawn[id]=true;
                    });
                    

                    var rawPts = greatCirclePoints(dep.lat, dep.lon, arr.lat, arr.lon, 50);
                    var continuousPts = makeContinuous(rawPts);
                    var linesForFlight = [];

                    if (f.isATC) {
                        // Draw a thin, wide stroked circle around the airport for ATC
                        mapOffsets.forEach(function(offset) {
                        // Use L.circle instead of L.circleMarker so it scales with zoom
                        var circle = L.circle([dep.lat, dep.lon + offset], {
                            radius: 20000, // Roughly 43 nautical miles (typical airspace size)
                                color: '#64c49a', // Matches standard flight path green
                                weight: 1,
                                fillColor: 'transparent', 
                                fillOpacity: 0,
                                opacity: 0.5,
                                interactive: false
                            });
                            
                            circle.on('add', function() {
                                if (glowMode === 'on' && circle.getElement()) {
                                    circle.getElement().classList.add('glow-path');
                                }
                            });

                            drawnLayers.addLayer(circle);
                            linesForFlight.push(circle);
                        });
                    } else {
                        // Standard Flight & Traffic Pattern Logic
                        var isTP = (f.remarks && /\bTP\s+at\b/i.test(f.remarks)) || (f.departure === f.arrival);
                        if (isTP) {
                            var sz = getTpSize();
                            var tpLat = dep.lat + sz.halfH * 0.2;
                            var tpLon = dep.lon + sz.halfW * 0.6;
                            var rectPts = makeRoundedRectPoints(tpLat, tpLon, sz.halfH, sz.halfW, sz.cornerR, 12);
                            mapOffsets.forEach(function(offset) {
                                var shifted = rectPts.map(function(p) { return [p[0], p[1] + offset]; });
                                var rectLine = L.polyline(shifted, { color: '#64c49a', weight: 1, opacity: 0.5, interactive: false });
                                
                                rectLine.on('add', function() {
                                    if (glowMode === 'on' && rectLine.getElement()) {
                                        rectLine.getElement().classList.add('glow-path');
                                    }
                                });
                                
                                drawnLayers.addLayer(rectLine);
                                linesForFlight.push(rectLine);
                                tpLayers.push(rectLine);
                            });
                        }

                        mapOffsets.forEach(function(offset) {
                            var shiftedPts = continuousPts.map(function(p) { return [p[0], p[1] + offset]; });
                            var line = L.polyline(shiftedPts, { color: '#64c49a', weight: 1, opacity: 0.5, interactive: false });
                            
                            line.on('add', function() {
                                if (glowMode === 'on' && line.getElement()) {
                                    line.getElement().classList.add('glow-path');
                                }
                            });

                            drawnLayers.addLayer(line);
                            linesForFlight.push(line);
                        });
                    }


                    mapOffsets.forEach(function(offset) {
                        var shiftedPts = continuousPts.map(function(p) { return [p[0], p[1] + offset]; });
                        var line = L.polyline(shiftedPts, { color: '#64c49a', weight: 1, opacity: 0.5, interactive: false });
                        
                        line.on('add', function() {
                            if (glowMode === 'on' && line.getElement()) {
                                line.getElement().classList.add('glow-path');
                            }
                        });

                        drawnLayers.addLayer(line);
                        linesForFlight.push(line);
                    });
                    flightLayers.push({flight:f, layers: linesForFlight});
                });
                
                window.updateCircles();
                window.updateGlows();
            }

            window.applyFiltersGlobal = function() {
                var sd = document.getElementById('start-date').value ? new Date(document.getElementById('start-date').value) : null;
                var ed = document.getElementById('end-date').value   ? new Date(document.getElementById('end-date').value)   : null;
                if (sd) sd.setHours(0,0,0,0);
                if (ed) ed.setHours(23,59,59,999);
                
                var strictMatch = document.getElementById('airport-strict-match').checked;

                var result = flights.filter(function(f){
                    if (sd || ed) {
                        var fd=new Date(f.date);
                        if (sd && fd<sd) return false;
                        if (ed && fd>ed) return false;
                    }

                    var acf = filterState.aircraft;
                    // If it's an ATC session, it usually has no aircraft. Handle filter logic:
                    if (acf.includes.size > 0 || acf.excludes.size > 0) {
                        if (f.isATC) return false; // Hide ATC sessions if specifically filtering for aircraft attributes.
                        
                        var d = getAircraftDetails(f.aircraft);
                        var isIncluded = false, isExcluded = false;
                        function checkMatch(v) {
                            if (v.startsWith('mfr:') && d.mfr === v.slice(4)) return true;
                            if (v.startsWith('fam:') && d.family === v.slice(4)) return true;
                            if (v.startsWith('spc:') && d.specific === v.slice(4)) return true;
                            return false;
                        }
                        acf.includes.forEach(function(v){ if(checkMatch(v)) isIncluded = true; });
                        acf.excludes.forEach(function(v){ if(checkMatch(v)) isExcluded = true; });
                        if (acf.excludes.size > 0 && isExcluded) return false;
                        if (acf.includes.size > 0 && !isIncluded) return false;
                    }

                    var alf = filterState.airline;
                    if (alf.includes.size > 0 || alf.excludes.size > 0) {
                        var isIncAl = alf.includes.has(f.livery);
                        var isExcAl = alf.excludes.has(f.livery);
                        if (alf.excludes.size > 0 && isExcAl) return false;
                        if (alf.includes.size > 0 && !isIncAl) return false;
                    }

                    var apf = filterState.airport;
                    if (apf.includes.size > 0 || apf.excludes.size > 0) {
                        var depAp = airportData[f.departure] || {};
                        var arrAp = airportData[f.arrival] || {};

                        var depMatches = [];
                        var arrMatches = [];
                        var isExcludedDep = false, isExcludedArr = false;

                        function checkApMatch(v, icao, apObj) {
                            if (v.startsWith('reg:') && apObj.continent === v.slice(4)) return true;
                            if (v.startsWith('cty:') && apObj.country === v.slice(4)) return true;
                            if (v === icao) return true;
                            return false;
                        }

                        apf.includes.forEach(function(v){
                            if (checkApMatch(v, f.departure, depAp)) depMatches.push(v);
                            if (checkApMatch(v, f.arrival, arrAp)) arrMatches.push(v);
                        });

                        apf.excludes.forEach(function(v){
                            if (checkApMatch(v, f.departure, depAp)) isExcludedDep = true;
                            if (checkApMatch(v, f.arrival, arrAp)) isExcludedArr = true;
                        });

                        var isExcAp = isExcludedDep || isExcludedArr;
                        if (apf.excludes.size > 0 && isExcAp) return false;

                        if (apf.includes.size > 0) {
                            if (strictMatch && apf.includes.size >= 2) {
                                if (depMatches.length === 0 || arrMatches.length === 0) return false;
                                
                                var crossedFilters = false;
                                for (var i = 0; i < depMatches.length; i++) {
                                    for (var j = 0; j < arrMatches.length; j++) {
                                        if (depMatches[i] !== arrMatches[j]) {
                                            crossedFilters = true;
                                            break;
                                        }
                                    }
                                }
                                if (!crossedFilters) return false;
                                
                            } else if (strictMatch && apf.includes.size === 1) {
                                if (depMatches.length === 0 || arrMatches.length === 0) return false;
                            } else {
                                if (depMatches.length === 0 && arrMatches.length === 0) return false;
                            }
                        }
                    }
                    return true;
                });

                renderMap(result);
                renderVisibleRoutes(result); 
            };

            window.resetFilters = function() {
                document.getElementById('start-date').value='';
                document.getElementById('end-date').value='';
                document.getElementById('airport-strict-match').checked = false;
                filterHistory = [];
                ['aircraft','airline','airport'].forEach(function(key){
                    filterState[key].includes.clear(); filterState[key].excludes.clear();
                });
                window.renderAllActiveFilters();
                window.applyFiltersGlobal();
            };

            Papa.parse('/Infinite Flight Aircraft Livery List.csv', {
                download: true,
                header: true,
                complete: function(liveryResults) {
                    liveryResults.data.forEach(function(row) {
                        var name = row["Infinite Flight Livery Name"];
                        if (name) {
                            window.liveryColorMap[name.trim()] = [
                                row["Color 1"], 
                                row["Color 2"], 
                                row["Color 3"]
                            ];
                        }
                    });
                    
                    window.renderAllActiveFilters();
                    renderMap(flights);
                    renderVisibleRoutes(flights);
                },
                error: function(err) {
                    console.error('Could not load livery colors:', err);
                    window.renderAllActiveFilters();
                    renderMap(flights);
                    renderVisibleRoutes(flights);
                }
            });

        },
        error: function(err) { document.getElementById('loading').innerText='ERR: APT DATA'; console.error(err); }
    });
});

map.on('zoomend', function() {
    window.updateCircles();
    
    // Copy the currently open flights before resetting
    var savedSelections = new Set(window.selectedFlightIndices);
    var sidebarContainer = document.getElementById('sidebar-routes');
    var savedScroll = sidebarContainer ? sidebarContainer.scrollTop : 0;

    if (window.applyFiltersGlobal) window.applyFiltersGlobal();
    
    // Re-click all previously opened flights to restore them
    savedSelections.forEach(function(idx) {
        var row = document.querySelector('.flight-row[data-index="' + idx + '"]');
        if (row) row.click();
    });
    
    if (sidebarContainer) {
        sidebarContainer.scrollTop = savedScroll;
    }
});


</script>
