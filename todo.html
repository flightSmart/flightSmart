<!DOCTYPE html>
<html>
<head>
    <title>Flight TODO Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://fonts.googleapis.com/css?family=B612+Mono' rel='stylesheet'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Shadows+Into+Light&display=swap" rel="stylesheet">    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="icon" type="image/x-icon" href="/images/favicon_logbook.png">
    
    <style>
        /* ═══════════════════════════════════════════════════════════
           FLIGHTSMART THEME OVERRIDE
        ═══════════════════════════════════════════════════════════ */
        :root {
            --bg-dark: rgb(30, 30, 30);
            --bg-light: rgb(50, 50, 50);
            --bg-hover: rgb(60, 60, 60);
            --text-main: rgb(224, 225, 226);
            --text-muted: rgb(150, 150, 150);
            --accent-green: rgb(100, 195, 153);
            --accent-orange: rgb(250, 152, 34);
            --border-main: rgb(131, 131, 131);
            --border-faint: rgba(232, 232, 232, 0.275);
            --font-mono: 'B612 Mono', monospace;
            --font-sans: Helvetica, sans-serif;
        }

        [data-theme="light"] {
            --bg-dark: rgb(220, 220, 220);
            --bg-light: rgb(225, 225, 225);
            --bg-hover: rgb(218, 217, 213);
            --text-main: rgb(70, 70, 70);
            --text-muted: rgb(105, 105, 105);
            --accent-green: rgb(0, 148, 90);
            --border-main: rgb(165, 165, 165);
            --border-faint: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0; padding: 0;
            font-family: var(--font-mono);
            display: flex; flex-direction: row; 
            overflow: hidden; height: 100vh;
            letter-spacing: -0.5px;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        /* ── POPUP STYLING ── */
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: var(--bg-dark) !important;
            color: var(--text-main) !important;
            border: 1px solid var(--border-main);
            font-family: var(--font-mono);
            border-radius: 0px;
        }
        .leaflet-popup-content { margin: 12px; }

        /* ── PANELS ── */
        #left-panel {
            width: 400px; height: 100%;
            background: var(--bg-dark);
            display: flex; flex-direction: column; flex-shrink: 0;
            border-right: 1px solid var(--border-main);
            z-index: 2000;
        }

        #map-container { flex-grow: 1; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; background: var(--bg-dark); }

        .leaflet-layer { filter: hue-rotate(0deg) brightness(100%) contrast(100%) saturate(0%); }
        [data-theme="light"] .leaflet-layer { filter: none; }

        #loading {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: var(--bg-light); padding: 9px 14px; 
            border: 1px solid var(--border-main);
            color: var(--text-main); font-size: 10px;
        }

        .map-overlay-btns {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            display: flex; gap: 6px;
        }
        
        .map-btn {
            background-color: var(--bg-light); border: 1px solid var(--border-main);
            color: var(--text-main); font-size: 8px; cursor: pointer;
            padding: 5px 10px; font-family: var(--font-mono);
        }

        #routes-label {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 15px; background: var(--bg-light);
            border-bottom: 1px solid var(--border-main); font-size: 10px;
        }
        
        /* Filter Status Bar */
        #filter-status {
            display: none; justify-content: space-between; align-items: center;
            padding: 8px 15px; background: rgba(250, 152, 34, 0.15);
            border-bottom: 1px solid var(--accent-orange); font-size: 10px;
            color: var(--accent-orange); cursor: pointer; font-weight: bold;
        }
        #filter-status:hover { background: rgba(250, 152, 34, 0.3); }

        #sidebar-routes { padding: 0; overflow-y: auto; flex-grow: 1; }

        table { width: 100%; border-collapse: collapse; font-size: 10px; table-layout: fixed; }
        th {
            padding: 7px 6px; text-align: left; background: var(--bg-light);
            border-bottom: 1px solid var(--border-main); color: var(--border-main); font-size: 8px;
        }
        td {
            padding: 8px 6px; border-bottom: 1px solid var(--border-faint);
            vertical-align: top;
        }

        /* ── MULTI-LINE REMARKS ── */
        .target-cell { 
            white-space: normal; /* Allows wrapping */
            line-height: 1.4;
        }
        .notes-cell {
            white-space: normal; 
            word-wrap: break-word;
            line-height: 1.4;
            color: var(--text-muted);
        }

        .flight-row:hover td { background-color: var(--bg-hover) !important; cursor: pointer; }
        .active-row td { background-color: rgba(250, 152, 34, 0.4) !important; border-top: 1px solid var(--accent-orange); border-bottom: 1px solid var(--accent-orange); }

        .map-airport-label {
            font-family: var(--font-mono); font-size: 9px; color: rgb(180, 180, 180);
            text-shadow: 0 0 3px rgb(30, 30, 30); pointer-events: none;
        }

        [data-theme="light"] .map-airport-label {
            color: rgb(50, 50, 50);
            text-shadow: 0 0 3px rgb(255, 255, 255), 0 0 5px rgb(255, 255, 255);
        }
        
        /* Map Hover States for Interactivity */
        path.leaflet-interactive { cursor: pointer; transition: fill-opacity 0.2s ease-in-out; }
        path.leaflet-interactive:hover { fill-opacity: 0.5 !important; }


        /* ── TYPE FILTERS ── */
        .type-filter-btn {
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 3px;
            transition: background-color 0.2s, color 0.2s;
        }
        .type-filter-btn:hover {
            background-color: var(--bg-hover);
        }
        .type-filter-btn.active {
            background-color: var(--accent-orange);
            color: var(--bg-dark);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="left-panel">
    <div id="routes-label">
        <span>FLIGHT TODO LIST</span>
        <span> 
            <a href="https://docs.google.com/spreadsheets/d/1WLK13WNevOgSQYBfw6t5ZXYVFseuXmvt1YAhQET9xzE/edit?usp=sharing" style="font-family: var(--font-mono); font-weight: normal; color: var(--text-main); text-decoration: underline;">LINK</a> 
        </span>
        <div style="font-family: var(--font-mono); font-weight: normal;">
        </div>
    </div>

<div id="routes-label">
    <span class="type-filter-btn active" onclick="setTypeFilter('ALL')">ALL</span>
    <div style="font-family: var(--font-mono); font-weight: normal;"></div>
    <span class="type-filter-btn" onclick="setTypeFilter('GA')">GA</span>
    <div style="font-family: var(--font-mono); font-weight: normal;"></div>
    <span class="type-filter-btn" onclick="setTypeFilter('MIL')">MIL</span>
    <div style="font-family: var(--font-mono); font-weight: normal;"></div>
    <span class="type-filter-btn" onclick="setTypeFilter('SH')">SH</span>
    <div style="font-family: var(--font-mono); font-weight: normal;"></div>
    <span class="type-filter-btn" onclick="setTypeFilter('MH')">MH</span>
    <div style="font-family: var(--font-mono); font-weight: normal;"></div>
    <span class="type-filter-btn" onclick="setTypeFilter('LH')">LH</span>
</div>

    <div id="filter-status" onclick="setFilter(null, null)">
        <span id="filter-text">Showing All</span>
        <span>CLEAR ✕</span>
    </div>
    <div id="sidebar-routes">
        <p style="color: var(--text-muted); text-align:center; margin-top:30px; font-size:9px;">Loading...</p>
    </div>
</div>

<div id="map-container">
    <div id="loading">Loading data...</div>
    <div class="map-overlay-btns">
        <button class="map-btn" onclick="toggleLeftPanel()"> < LIST </button>
        <button class="map-btn" onclick="toggleTheme()"> THEME </button>
    </div>
    <div id="map"></div>
</div>

<script>
var map = L.map('map', { zoomControl: false, worldCopyJump: true }).setView([20, 0], 2);
var darkTileUrl = 'https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}';
var lightTileUrl = 'https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}';
var mapBaseLayer = L.tileLayer(darkTileUrl, { maxZoom: 16 }).addTo(map);

var drawnLayers = L.layerGroup().addTo(map);
var airportLabelGroup = L.layerGroup().addTo(map);

var todoSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSbDzElsl07EkMoZQIZej_FZjKEZlTYjNDh3OtpohmLlr5rI6BtU29qMAwpVa9DAP6adc4-_bnFvnn3/pub?output=csv"; 
var geojsonUrl = "https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json";
var airportsUrl = "https://raw.githubusercontent.com/davidmegginson/ourairports-data/main/airports.csv";

var currentFilter = { type: null, value: null };
var currentTypeFilter = 'ALL'; // ADD THIS LINE
var countryDisplayName = new Intl.DisplayNames(['en'], {type: 'region'});

function isSameCountry(name1, name2) {
    if (!name1 || !name2) return false;
    var n1 = name1.toLowerCase(), n2 = name2.toLowerCase();
    return n1 === n2 || n1.includes(n2) || n2.includes(n1);
}

function toggleTheme() {
    var curr = document.documentElement.getAttribute('data-theme') || 'dark';
    var next = curr === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    mapBaseLayer.setUrl(next === 'light' ? lightTileUrl : darkTileUrl);
}

function toggleLeftPanel() {
    var lp = document.getElementById('left-panel');
    lp.style.display = lp.style.display === 'none' ? 'flex' : 'none';
    map.invalidateSize();
}

function setTypeFilter(type) {
    currentTypeFilter = type;
    
    // Update button visual states
    document.querySelectorAll('.type-filter-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.innerText === type) btn.classList.add('active');
    });

    // Reset map interactions and re-render
    setFilter(null, null); 
    renderMap();
    renderList();
}


// Clear filter when clicking empty space on map
map.on('click', function() {
    setFilter(null, null);
});

// Clear filter when pressing Escape
document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape') {
        setFilter(null, null);
    }
});

function setFilter(type, value) {
    currentFilter = { type: type, value: value };
    var fs = document.getElementById('filter-status');
    if (type) {
        fs.style.display = 'flex';
        var txt = type === 'airport' ? `FILTER: Airport ${value}` : `FILTER: Country ${value.toUpperCase()}`;
        document.getElementById('filter-text').innerText = txt;
    } else {
        fs.style.display = 'none';
        document.querySelectorAll('.flight-row').forEach(r => r.classList.remove('active-row'));
    }
    renderList();
}

Promise.all([
    new Promise(res => Papa.parse(todoSheetUrl, { download: true, complete: res, error: () => res({data:[]}) })),
    fetch(geojsonUrl).then(r => r.json()),
    new Promise(res => Papa.parse(airportsUrl, { download: true, header: true, complete: res }))
]).then(results => {
    var sheetData = results[0].data;
    var geojson = results[1];
    var airportRes = results[2].data;

    window.airportData = {};
    airportRes.forEach(r => { if(r.ident) window.airportData[r.ident.toUpperCase()] = r; });

    window.countryFeatures = {};
    geojson.features.forEach(f => {
        var name = (f.properties.name || f.properties.ADMIN || "").toLowerCase();
        window.countryFeatures[name] = f;
    });

    window.todos = [];
    window.uniqueDestinations = new Set();
    window.highlightedCountries = new Set();

    sheetData.forEach((row, idx) => {
        if(idx === 0 || !row[1]) return;
        
        // Split the target string by commas and clean up spaces
        var rawTargets = row[1].split(',').map(s => s.trim()).filter(s => s);
        
        var icaos = [];
        var countries = [];

        // Identify every item in the cell
        rawTargets.forEach(target => {
            var icao = (target.length === 4 && window.airportData[target.toUpperCase()]) ? target.toUpperCase() : null;
            var countryMatch = (!icao && window.countryFeatures[target.toLowerCase()]) ? window.countryFeatures[target.toLowerCase()].properties.name : null;

            if (icao) { icaos.push(icao); window.uniqueDestinations.add(icao); }
            if (countryMatch) { countries.push(countryMatch); window.uniqueDestinations.add(countryMatch); window.highlightedCountries.add(countryMatch); }
        });
        
        window.todos.push({
            idx: idx,
            targetsArray: rawTargets,
            notes: row[2] || "",
            flightType: (row[3] || "").trim().toUpperCase(), // ADD THIS LINE to capture Column D
            icaos: icaos,
            countries: countries
        });
    });

    document.getElementById('loading').style.display = 'none';

    renderMap();
    renderList();
});
function renderMap() {
    drawnLayers.clearLayers();
    airportLabelGroup.clearLayers();

    // 1. Apply Type Filter
    var visibleTodos = todos.filter(t => currentTypeFilter === 'ALL' || t.flightType === currentTypeFilter);
    
    // 2. Identify currently active countries
    var visibleCountries = new Set();
    visibleTodos.forEach(t => t.countries.forEach(c => visibleCountries.add(c)));

    // 3. Draw Countries FIRST
    visibleCountries.forEach(c => {
        var feature = Object.values(window.countryFeatures).find(f => (f.properties.name || f.properties.ADMIN) === c);
        if (feature) {
            [-360, 0, 360].forEach(offset => {
                L.geoJSON(feature, {
                    coordsToLatLng: coords => L.latLng(coords[1], coords[0] + offset),
                    style: { fillColor: 'var(--accent-green)', color: 'var(--accent-green)', weight: 1, fillOpacity: 0.2 }
                }).on('click', function(e) {
                    setFilter('country', c);
                    L.DomEvent.stopPropagation(e);
                }).addTo(drawnLayers);
            });
        }
    });

    // 4. Draw Airports SECOND
    visibleTodos.forEach(t => {
        if (t.icaos && t.icaos.length > 0) {
            t.icaos.forEach(icao => {
                var ap = airportData[icao];
                var lat = parseFloat(ap.latitude_deg), lon = parseFloat(ap.longitude_deg);
                
                var apCountry = "Unknown";
                try { apCountry = countryDisplayName.of(ap.iso_country); } catch(e) {}

                [-360, 0, 360].forEach(offset => {
                    var marker = L.circleMarker([lat, lon + offset], {
                        radius: 6, weight: 1, color: 'var(--bg-dark)', fillColor: 'var(--accent-orange)', fillOpacity: 0.9
                    });

                    var wiki = ap.wikipedia_link || `https://en.wikipedia.org/wiki/Special:Search?search=${icao}+Airport`;
                    var gmaps = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`; // <-- Added Google Maps URL
                    var city = ap.municipality || "Unknown City";
                    
                    var isTargetCountry = Array.from(visibleCountries).some(c => isSameCountry(c, apCountry));
                    var countryBadge = isTargetCountry ? `<div style="margin-top: 5px;"><span style="background: var(--accent-green); color: var(--bg-dark); padding: 2px 5px; border-radius: 3px; font-weight: bold; font-size: 9px;">TODO: ${apCountry.toUpperCase()}</span></div>` : '';

                    // Wrapped the links in a flex container with a gap to keep them cleanly stacked
                    var popupContent = `
                        <div style="font-size: 11px; line-height: 1.4;">
                            <b style="color: var(--accent-orange); font-size: 13px;">${ap.name}</b><br>
                            <span style="color: var(--text-main);">${city}, ${apCountry}</span>
                            ${countryBadge}
                            <hr style="border: 0; border-top: 1px solid var(--border-faint); margin: 8px 0;">
                            <div style="display: flex; flex-direction: column; gap: 5px;">
                                <a href="${wiki}" target="_blank" style="color: var(--accent-green); text-decoration: none;">Wikipedia: Routes & Operators ↗</a>
                                <a href="${gmaps}" target="_blank" style="color: var(--accent-green); text-decoration: none;">Google Maps: Coordinates ↗</a>
                            </div>
                        </div>`;

                    marker.bindPopup(popupContent);
                    marker.on('click', (e) => { 
                        setFilter('airport', icao);
                        panToItem(t.idx, false); 
                        marker.openPopup(); 
                        L.DomEvent.stopPropagation(e);
                    });
                    drawnLayers.addLayer(marker);

                    var label = L.marker([lat, lon + offset], {
                        icon: L.divIcon({ className: '', html: `<div class="map-airport-label">${icao}</div>`, iconAnchor: [-10, 5] }),
                        interactive: false
                    });
                    airportLabelGroup.addLayer(label);
                });
            });
        }
    });
}

function renderList() {
    var container = document.getElementById('sidebar-routes');
    var html = '<table><thead><tr><th style="width:15%;">Target</th><th>Notes</th></tr></thead><tbody>';
    
    // 1. Apply Type Filter
    var baseTodos = todos.filter(t => currentTypeFilter === 'ALL' || t.flightType === currentTypeFilter);
    var filteredTodos = baseTodos;

    // 2. Apply Map Selection Filter
    if (currentFilter.type === 'airport') {
        var ap = airportData[currentFilter.value];
        var apCountryName = "Unknown";
        try { apCountryName = countryDisplayName.of(ap.iso_country); } catch(e) {}

        filteredTodos = baseTodos.filter(t => {
            if (t.icaos.includes(currentFilter.value)) return true;
            if (t.countries.some(c => isSameCountry(c, apCountryName))) return true;
            return false;
        });
    } else if (currentFilter.type === 'country') {
        filteredTodos = baseTodos.filter(t => {
            if (t.countries.some(c => isSameCountry(c, currentFilter.value))) return true;
            return t.icaos.some(icao => {
                var ap = airportData[icao];
                var apCountryName = "Unknown";
                try { apCountryName = countryDisplayName.of(ap.iso_country); } catch(e) {}
                return isSameCountry(apCountryName, currentFilter.value);
            });
        });
    }

    // 3. Render List
    filteredTodos.forEach(t => {
        var color = (t.icaos.length > 0 || t.countries.length > 0) ? 'var(--accent-green)' : 'var(--text-main)';
        var multiLineTarget = t.targetsArray.join('<br>'); 
        html += `
            <tr class="flight-row" id="row-${t.idx}" onclick="panToItem(${t.idx}, true)">
                <td class="target-cell"><b style="color:${color}">${multiLineTarget}</b></td>
                <td class="notes-cell">${t.notes}</td>
            </tr>`;
    });
    container.innerHTML = html + '</tbody></table>';
}

function panToItem(idx, shouldFilter) {
    var t = todos.find(x => x.idx === idx);
    document.querySelectorAll('.flight-row').forEach(r => r.classList.remove('active-row'));
    var rowNode = document.getElementById(`row-${idx}`);
    if(rowNode) rowNode.classList.add('active-row');

    if (shouldFilter) {
        if (t.icaos.length === 1) setFilter('airport', t.icaos[0]);
        else if (t.icaos.length > 1) setFilter(null, null); // Show the whole route
        else if (t.countries.length > 0) setFilter('country', t.countries[0]);
    }

    var bounds = L.latLngBounds();
    var hasBounds = false;

    // if (t.icaos && t.icaos.length > 0) {
    //     t.icaos.forEach(icao => {
    //         var ap = airportData[icao];
    //         bounds.extend([ap.latitude_deg, ap.longitude_deg]);
    //         hasBounds = true;
    //     });
    // }
    
    // if (t.countries && t.countries.length > 0) {
    //     t.countries.forEach(country => {
    //         var feat = Object.values(window.countryFeatures).find(f => (f.properties.name || f.properties.ADMIN) === country);
    //         if (feat) {
    //             bounds.extend(L.geoJSON(feat).getBounds());
    //             hasBounds = true;
    //         }
    //     });
    // }

    // if (hasBounds) {
    //     if (t.icaos.length === 1 && t.countries.length === 0) {
    //         map.flyToBounds(bounds, { maxZoom: 7 }); 
    //     } else {
    //         // Frame all markers in the route
    //         map.flyToBounds(bounds, { padding: [50, 50], maxZoom: 5 });
    //     }
    // }
}
</script>
</body>
</html>
